<main class="tttri-sheet character-main-page">
  <header class="identity-panel" aria-label="干员身份" data-guide-region-id="identity">
    <div class="brand-panel">
      <span>共赴明日</span>
      <span>罗德岛旅记</span>
    </div>
    <div class="identity-fields">
      <div class="identity-field"><pb-module id="character-name"></pb-module></div>
      <div class="picker-field identity-field" data-guide-region-id="class">
        <pb-module id="class-name"></pb-module>
        <pb-module id="pick-class"></pb-module>
      </div>
      <div class="identity-field-wrapper">
        <div class="picker-field identity-field" data-guide-region-id="ancestry"><pb-module id="ancestry-name"></pb-module><pb-module id="pick-ancestry"></pb-module></div>
        <div class="picker-field identity-field" data-guide-region-id="community"><pb-module id="community-name"></pb-module><pb-module id="pick-community"></pb-module></div>
      </div>
    </div>
    <div class="level-field"><pb-module id="level"></pb-module></div>
  </header>

  <section class="upper-stat-layout" aria-label="防御与属性" data-guide-region-id="core-stats">
    <h2 class="section-title">属性<span class="title-tag">TRAITS</span></h2>
    <div class="defense-summary">
      <pb-module id="evasion"></pb-module>
      <pb-module id="armor-value"></pb-module>
      <pb-module id="thresholds"></pb-module>
    </div>
    <div class="domain-row">
      <pb-module id="primary-domain"></pb-module>
      <pb-module id="secondary-domain"></pb-module>
    </div>
    <div class="trait-summary" data-guide-region-id="attributes">
      <pb-module id="agility"></pb-module>
      <pb-module id="strength"></pb-module>
      <pb-module id="finesse"></pb-module>
      <pb-module id="instinct"></pb-module>
      <pb-module id="presence"></pb-module>
      <pb-module id="knowledge"></pb-module>
    </div>
  </section>

  <div class="sheet-body-layout">
    <div class="sheet-left-column">
      <section class="sheet-region resource-region" aria-label="角色资源与领域" data-guide-region-id="class-features">
        <h2 class="section-title">资源<span class="title-tag">RESOURCE</span></h2>
        <div class="resource-feature-layout">
          <div class="resource-row">
            <pb-module id="hp"></pb-module>
            <pb-module id="stress"></pb-module>
            <pb-module id="armor-slots"></pb-module>
            <pb-module id="hope"></pb-module>
          </div>
          <div class="resource-feature-copy">
            <pb-module id="class-hope-feature"></pb-module>
          </div>
        </div>
      </section>

      <section class="sheet-region experience-region" aria-label="经历" data-guide-region-id="experiences">
        <h2 class="section-title">经历</h2>
        <div class="experience-list">
          <div><pb-module id="ancestry-experience"></pb-module><pb-module id="ancestry-experience-modifier"></pb-module></div>
          <div><pb-module id="experience-1"></pb-module><pb-module id="experience-modifier-1"></pb-module></div>
          <div><pb-module id="experience-2"></pb-module><pb-module id="experience-modifier-2"></pb-module></div>
          <div><pb-module id="experience-3"></pb-module><pb-module id="experience-modifier-3"></pb-module></div>
          <div><pb-module id="experience-4"></pb-module><pb-module id="experience-modifier-4"></pb-module></div>
          <div><pb-module id="experience-5"></pb-module><pb-module id="experience-modifier-5"></pb-module></div>
        </div>
      </section>

      <section class="sheet-region class-feature-region" aria-label="职业特性">
        <h2 class="section-title">职业特性</h2>
        <pb-module id="class-feature"></pb-module>
      </section>
    </div>

    <div class="sheet-right-column">
      <section class="sheet-region subclass-region" aria-label="当前干员" data-guide-region-id="subclass">
        <h2 class="section-title">干员</h2>
        <div class="subclass-heading-row">
          <pb-module id="subclass-name"></pb-module>
          <pb-module id="subclass-stage"></pb-module>
          <pb-module id="pick-subclass-t1"></pb-module>
        </div>
        <pb-module id="subclass-current"></pb-module>
      </section>

      <section class="sheet-region weapon-region" aria-label="武器原型" data-guide-region-id="weapon-prototype">
        <div class="region-heading-row"><h2 class="section-title">武器原型</h2><pb-module id="proficiency"></pb-module></div>
        <pb-module id="weapon-summary"></pb-module>
        <pb-module id="weapon-feature"></pb-module>
      </section>

      <section class="sheet-region equipment-region" aria-label="护甲" data-guide-region-id="equipment">
        <h2 class="section-title">护甲</h2>
        <div class="picker-field">
          <pb-module id="armor-summary"></pb-module>
          <pb-module id="pick-armor"></pb-module>
        </div>
        <pb-module id="armor-feature"></pb-module>
      </section>

      <section class="sheet-region inventory-region" aria-label="物品栏" data-guide-region-id="inventory">
        <h2 class="section-title">物品栏</h2>
        <div class="item-list"><pb-module id="inventory"></pb-module><pb-module id="pick-inventory-item"></pb-module></div>
        <h2 class="section-title">金币区</h2>
        <div class="currency-row" aria-label="金币">
          <pb-module id="handful-gold"></pb-module>
          <pb-module id="bag-gold"></pb-module>
          <pb-module id="chest-gold"></pb-module>
        </div>
      </section>
    </div>
  </div>
</main>
