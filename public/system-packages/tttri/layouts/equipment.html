<main class="tttri-page tttri-equipment-page">
  <header class="page-header"><h1>装备与物品</h1></header>
  <section class="section" data-guide-region-id="equipment">
    <h2>护甲</h2>
    <div class="inline-grid armor-grid">
      <pb-module id="pick-armor"></pb-module>
      <pb-module id="armor-name"></pb-module>
      <pb-module id="armor-base-major"></pb-module>
      <pb-module id="armor-base-severe"></pb-module>
      <pb-module id="armor-value"></pb-module>
      <pb-module id="armor-slots"></pb-module>
    </div>
    <pb-module id="armor-description"></pb-module>
  </section>
  <section class="section" data-guide-region-id="inventory">
    <h2>物品栏</h2>
    <div class="inline-grid inventory-header-grid">
      <pb-module id="pick-inventory-item"></pb-module>
      <pb-module id="currency"></pb-module>
    </div>
    <pb-module id="inventory"></pb-module>
  </section>
</main>
