<main class="tttri-sheet character-story-page">
  <span class="ak-corner ak-corner-tl"></span>
  <span class="ak-corner ak-corner-tr"></span>
  <span class="ak-corner ak-corner-bl"></span>
  <span class="ak-corner ak-corner-br"></span>
  <span class="ak-page-top"></span>

  <section class="story-overview" aria-label="背景、笔记与头像">
    <pb-module id="background-story"></pb-module>
    <pb-module id="notes"></pb-module>
    <pb-module id="character-avatar"></pb-module>
  </section>

  <section class="question-layout" aria-label="背景与关系问题">
    <div class="question-column" data-guide-region-id="background-questions">
      <h2>创建个人经历<span class="title-tag">ORIGIN</span></h2>
      <article class="question-pair"><pb-module id="background-question-1"></pb-module><pb-module id="background-answer-1"></pb-module></article>
      <article class="question-pair"><pb-module id="background-question-2"></pb-module><pb-module id="background-answer-2"></pb-module></article>
      <article class="question-pair"><pb-module id="background-question-3"></pb-module><pb-module id="background-answer-3"></pb-module></article>
    </div>
    <div class="question-column" data-guide-region-id="connection-questions">
      <h2>创建队友关系<span class="title-tag">BONDS</span></h2>
      <article class="question-pair"><pb-module id="connection-question-1"></pb-module><pb-module id="connection-answer-1"></pb-module></article>
      <article class="question-pair"><pb-module id="connection-question-2"></pb-module><pb-module id="connection-answer-2"></pb-module></article>
      <article class="question-pair"><pb-module id="connection-question-3"></pb-module><pb-module id="connection-answer-3"></pb-module></article>
    </div>
  </section>

  <section class="advancement-region" aria-label="升级记录" data-guide-region-id="advancement">
    <h2>升级记录<span class="title-tag">ADVANCE</span></h2>
    <div class="advancement-grid">
      <article>
        <h3>T2 · 等级 2–4</h3>
        <pb-module id="advancement-tier-2-reward"></pb-module>
        <pb-module id="advancement-tier-2"></pb-module>
        <pb-module id="advancement-tier-2-footer"></pb-module>
      </article>
      <article>
        <h3>T3 · 等级 5–7</h3>
        <pb-module id="advancement-tier-3-reward"></pb-module>
        <pb-module id="advancement-tier-3"></pb-module>
        <pb-module id="advancement-tier-3-footer"></pb-module>
      </article>
      <article>
        <h3>T4 · 等级 8–10</h3>
        <pb-module id="advancement-tier-4-reward"></pb-module>
        <pb-module id="advancement-tier-4"></pb-module>
        <pb-module id="advancement-tier-4-footer"></pb-module>
      </article>
    </div>
  </section>
</main>
