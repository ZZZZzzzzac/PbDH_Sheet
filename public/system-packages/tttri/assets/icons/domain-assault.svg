<svg xmlns="http://www.w3.org/2000/svg" viewBox="-7.5 -7.22 57.87 55.69">
  <!-- 领域纹章·攻坚 ASSAULT:几何源自 docs/pbdh/粥/图标PNG及SVG/资源 5.svg;SMIL 内置入场淡入+无限循环,依领域图标动画规范。 -->
  <defs>
    <filter id="ak-ring-halo">
      <feMorphology in="SourceGraphic" operator="dilate" radius="0.2" result="dilated"/>
      <feComposite in="dilated" in2="SourceGraphic" operator="out"/>
    </filter>
  </defs>
  <!-- ak-ring 光环:0.05s 起 0.6s ease-out 扩散淡出(scale 1→1.35, opacity 1→0),feMorphology 融合多形状后描边 -->
  <g transform="translate(21.43 20.62)">
    <g>
      <animateTransform attributeName="transform" type="scale" from="1" to="1.35" begin="0.05s" dur="0.6s" calcMode="spline" keySplines="0.25 0.46 0.45 0.94" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" begin="0.05s" dur="0.6s" calcMode="spline" keySplines="0.25 0.46 0.45 0.94" fill="freeze"/>
      <g transform="translate(-21.43 -20.62)" fill="#63bfd1" filter="url(#ak-ring-halo)">
        <polygon points="36.68 12.14 6.25 41.25 33.89 30.18 26.17 30.18 36.68 12.14"/>
        <polygon points="4.71 1.88 11.52 29.7 0 18.83 6.25 21.29 4.71 1.88"/>
        <polyline points="7.14 0 42.87 10.42 9.79 10.8"/>
        <polygon points="10.61 13.23 14.64 29.7 32.32 12.78 10.61 13.23"/>
      </g>
    </g>
  </g>
  <!-- ak-starburst 实体:0.15s 起 0.4s ease-out 淡入;0.8s 起 divineFloat 3.5s indefinite(translateY 0↔-0.8, scale 1↔1.015, opacity 1↔0.95) -->
  <g transform="translate(0 0.8)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -1.6;0 0" keyTimes="0;0.5;1" begin="0.8s" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      <animate attributeName="opacity" values="0.7;1;0.7" keyTimes="0;0.5;1" begin="0.8s" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.4s" calcMode="spline" keySplines="0.25 0.46 0.45 0.94" fill="freeze"/>
        <g fill="#63bfd1" opacity="0.08">
          <polygon points="36.68 12.14 6.25 41.25 33.89 30.18 26.17 30.18 36.68 12.14"/>
          <polygon points="4.71 1.88 11.52 29.7 0 18.83 6.25 21.29 4.71 1.88"/>
          <polyline points="7.14 0 42.87 10.42 9.79 10.8"/>
          <polygon points="10.61 13.23 14.64 29.7 32.32 12.78 10.61 13.23"/>
        </g>
      </g>
    </g>
  </g>
</svg>
