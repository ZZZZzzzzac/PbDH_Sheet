<main class="daggerheart-sheet character-story-page prism-story-page">
  <div class="prism-page-corner prism-page-corner-tl"></div>
  <div class="prism-page-corner prism-page-corner-br"></div>

  <header class="prism-story-banner">
    <span class="prism-eyebrow">CHRONICLE · 角色编年</span>
    <strong>故事与成长</strong>
    <span class="prism-story-banner-beam"></span>
  </header>

  <section class="story-overview prism-story-overview" aria-label="角色设定概览">
    <div class="prism-story-cell">
      <span class="prism-panel-caption">EVENT LOG</span>
      <pb-module id="event-log"></pb-module>
    </div>
    <div class="prism-story-cell">
      <span class="prism-panel-caption">BACKGROUND</span>
      <pb-module id="background-story"></pb-module>
    </div>
    <div class="prism-story-cell prism-story-avatar-cell">
      <span class="prism-panel-caption">PORTRAIT</span>
      <pb-module id="character-avatar"></pb-module>
    </div>
  </section>

  <section class="question-layout prism-question-layout" aria-label="背景与关系">
    <div class="question-column background-column prism-panel" data-guide-region-id="guide-background-questions">
      <div class="prism-panel-head">
        <h2>关于个人经历</h2>
        <span class="prism-panel-index">A</span>
      </div>
      <article class="question-pair prism-question-pair"><pb-module id="background-question-1"></pb-module><pb-module id="background-answer-1"></pb-module></article>
      <article class="question-pair prism-question-pair"><pb-module id="background-question-2"></pb-module><pb-module id="background-answer-2"></pb-module></article>
      <article class="question-pair prism-question-pair"><pb-module id="background-question-3"></pb-module><pb-module id="background-answer-3"></pb-module></article>
    </div>
    <div class="question-column connection-column prism-panel" data-guide-region-id="guide-connection-questions">
      <div class="prism-panel-head">
        <h2>关于队友关系</h2>
        <span class="prism-panel-index">B</span>
      </div>
      <article class="question-pair prism-question-pair"><pb-module id="connection-question-1"></pb-module><pb-module id="connection-answer-1"></pb-module></article>
      <article class="question-pair prism-question-pair"><pb-module id="connection-question-2"></pb-module><pb-module id="connection-answer-2"></pb-module></article>
      <article class="question-pair prism-question-pair"><pb-module id="connection-question-3"></pb-module><pb-module id="connection-answer-3"></pb-module></article>
    </div>
  </section>

  <section class="advancement-region prism-panel prism-advancement" aria-label="升级记录">
    <div class="prism-panel-head">
      <h2>升级记录</h2>
      <span class="prism-panel-index">C</span>
    </div>
    <div class="advancement-grid">
      <article class="prism-tier-card">
        <h3>T2 · 等级 2–4</h3>
        <pb-module id="advancement-tier-2-reward"></pb-module>
        <pb-module id="advancement-tier-2-instructions"></pb-module>
        <pb-module id="advancement-tier-2"></pb-module>
        <pb-module id="advancement-tier-2-footer"></pb-module>
      </article>
      <article class="prism-tier-card">
        <h3>T3 · 等级 5–7</h3>
        <pb-module id="advancement-tier-3-reward"></pb-module>
        <pb-module id="advancement-tier-3-instructions"></pb-module>
        <pb-module id="advancement-tier-3"></pb-module>
        <pb-module id="advancement-tier-3-footer"></pb-module>
      </article>
      <article class="prism-tier-card">
        <h3>T4 · 等级 8–10</h3>
        <pb-module id="advancement-tier-4-reward"></pb-module>
        <pb-module id="advancement-tier-4-instructions"></pb-module>
        <pb-module id="advancement-tier-4"></pb-module>
        <pb-module id="advancement-tier-4-footer"></pb-module>
      </article>
    </div>
  </section>
</main>
