<main class="daggerheart-workspace astral-workspace">
  <section class="daggerheart-sheet-pane astral-sheet-vessel" aria-label="人物卡页面">
    <header class="astral-shell-banner" aria-label="暮光秘仪星图">
      <span class="astral-shell-mark">✦</span>
      <div>
        <strong>暮光秘仪</strong>
        <small>ASTRAL CARTOGRAPHER · CHARACTER ORRERY</small>
      </div>
      <span class="astral-shell-index">DH · 01</span>
    </header>
    <pb-page-outlet></pb-page-outlet>
  </section>

  <section class="daggerheart-card-pane astral-card-observatory" data-print-page="true" aria-label="持久卡牌桌面" data-guide-region-id="guide-domain-cards">
    <header class="astral-card-heading">
      <div>
        <small>DOMAIN OBSERVATORY</small>
        <h2>领域星盘</h2>
      </div>
      <p>将能力、记忆与命运置于轨道之上。</p>
    </header>
    <div class="card-picker-grid astral-card-pickers">
      <pb-module id="pick-domain-card"></pb-module>
      <pb-module id="pick-other-resources"></pb-module>
    </div>
    <div class="daggerheart-card-table-slot astral-card-table-slot">
      <pb-module id="character-card-table"></pb-module>
    </div>
  </section>
</main>
