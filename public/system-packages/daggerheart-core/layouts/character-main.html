<main class="daggerheart-sheet">
  <header class="sheet-heading">
    <h1>Daggerheart 人物卡</h1>
    <p>核心身份、属性与伤害阈值</p>
  </header>

  <section class="module-group" aria-label="角色身份">
    <h2>角色身份</h2>
    <div class="module-grid picker-grid">
      <pb-module id="pick-ancestry"></pb-module>
      <pb-module id="pick-community"></pb-module>
      <pb-module id="pick-class"></pb-module>
      <pb-module id="pick-subclass"></pb-module>
    </div>
    <div class="module-grid identity-grid">
      <pb-module id="character-name"></pb-module>
      <pb-module id="ancestry-name"></pb-module>
      <pb-module id="community-name"></pb-module>
      <pb-module id="class-name"></pb-module>
      <pb-module id="subclass-name"></pb-module>
      <pb-module id="level"></pb-module>
    </div>
  </section>

  <section class="module-group" aria-label="职业能力">
    <h2>职业与子职能力</h2>
    <div class="module-grid feature-grid">
      <pb-module id="class-hope-feature"></pb-module>
      <pb-module id="class-feature"></pb-module>
      <pb-module id="subclass-spellcast"></pb-module>
      <pb-module id="subclass-feature"></pb-module>
    </div>
  </section>

  <section class="module-group" aria-label="核心属性">
    <h2>核心属性</h2>
    <div class="module-grid trait-grid">
      <pb-module id="agility"></pb-module>
      <pb-module id="strength"></pb-module>
      <pb-module id="finesse"></pb-module>
      <pb-module id="instinct"></pb-module>
      <pb-module id="presence"></pb-module>
      <pb-module id="knowledge"></pb-module>
    </div>
  </section>

  <section class="module-group" aria-label="防御与阈值">
    <h2>防御与阈值</h2>
    <div class="module-grid defense-grid">
      <pb-module id="evasion"></pb-module>
      <pb-module id="major-threshold"></pb-module>
      <pb-module id="severe-threshold"></pb-module>
    </div>
  </section>

  <section class="module-group" aria-label="角色资源">
    <h2>角色资源</h2>
    <div class="module-grid resource-grid">
      <pb-module id="hp"></pb-module>
      <pb-module id="stress"></pb-module>
      <pb-module id="hope"></pb-module>
      <pb-module id="armor-slots"></pb-module>
      <pb-module id="proficiency"></pb-module>
    </div>
  </section>

  <section class="module-group" aria-label="金币">
    <h2>金币</h2>
    <div class="module-grid currency-grid">
      <pb-module id="handful-gold"></pb-module>
      <pb-module id="bag-gold"></pb-module>
      <pb-module id="chest-gold"></pb-module>
    </div>
  </section>

  <section class="module-group" aria-label="装备">
    <h2>装备</h2>
    <div class="equipment-stack">
      <article class="equipment-slot">
        <h3>主武器</h3>
        <pb-module id="pick-primary-weapon"></pb-module>
        <div class="module-grid equipment-grid">
          <pb-module id="primary-weapon-name"></pb-module><pb-module id="primary-weapon-stat"></pb-module>
          <pb-module id="primary-weapon-range"></pb-module><pb-module id="primary-weapon-damage"></pb-module>
          <pb-module id="primary-weapon-damage-type"></pb-module><pb-module id="primary-weapon-hands"></pb-module>
          <pb-module id="primary-weapon-description"></pb-module>
        </div>
      </article>
      <article class="equipment-slot">
        <h3>副武器</h3>
        <pb-module id="pick-secondary-weapon"></pb-module>
        <div class="module-grid equipment-grid">
          <pb-module id="secondary-weapon-name"></pb-module><pb-module id="secondary-weapon-stat"></pb-module>
          <pb-module id="secondary-weapon-range"></pb-module><pb-module id="secondary-weapon-damage"></pb-module>
          <pb-module id="secondary-weapon-damage-type"></pb-module><pb-module id="secondary-weapon-hands"></pb-module>
          <pb-module id="secondary-weapon-description"></pb-module>
        </div>
      </article>
      <article class="equipment-slot">
        <h3>备用武器一</h3>
        <pb-module id="pick-backup-weapon-1"></pb-module>
        <div class="module-grid equipment-grid">
          <pb-module id="backup-weapon-1-name"></pb-module><pb-module id="backup-weapon-1-category"></pb-module>
          <pb-module id="backup-weapon-1-stat"></pb-module><pb-module id="backup-weapon-1-range"></pb-module>
          <pb-module id="backup-weapon-1-damage"></pb-module><pb-module id="backup-weapon-1-damage-type"></pb-module>
          <pb-module id="backup-weapon-1-hands"></pb-module><pb-module id="backup-weapon-1-description"></pb-module>
        </div>
      </article>
      <article class="equipment-slot">
        <h3>备用武器二</h3>
        <pb-module id="pick-backup-weapon-2"></pb-module>
        <div class="module-grid equipment-grid">
          <pb-module id="backup-weapon-2-name"></pb-module><pb-module id="backup-weapon-2-category"></pb-module>
          <pb-module id="backup-weapon-2-stat"></pb-module><pb-module id="backup-weapon-2-range"></pb-module>
          <pb-module id="backup-weapon-2-damage"></pb-module><pb-module id="backup-weapon-2-damage-type"></pb-module>
          <pb-module id="backup-weapon-2-hands"></pb-module><pb-module id="backup-weapon-2-description"></pb-module>
        </div>
      </article>
      <article class="equipment-slot">
        <h3>护甲</h3>
        <pb-module id="pick-armor"></pb-module>
        <div class="module-grid equipment-grid">
          <pb-module id="armor-name"></pb-module><pb-module id="armor-base-major"></pb-module>
          <pb-module id="armor-base-severe"></pb-module><pb-module id="armor-value"></pb-module>
          <pb-module id="armor-description"></pb-module>
        </div>
      </article>
    </div>
  </section>

  <section class="module-group" aria-label="物品与消耗品">
    <h2>物品与消耗品</h2>
    <div class="module-grid item-grid">
      <article><pb-module id="pick-item-1"></pb-module><pb-module id="item-1"></pb-module></article>
      <article><pb-module id="pick-item-2"></pb-module><pb-module id="item-2"></pb-module></article>
      <article><pb-module id="pick-item-3"></pb-module><pb-module id="item-3"></pb-module></article>
      <article><pb-module id="pick-item-4"></pb-module><pb-module id="item-4"></pb-module></article>
      <article><pb-module id="pick-item-5"></pb-module><pb-module id="item-5"></pb-module></article>
    </div>
  </section>
</main>
