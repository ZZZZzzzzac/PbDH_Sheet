/* ============================================================
   CSS RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background-color: var(--color-body-bg);
  color: var(--color-text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Paper noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");

}

/* ============================================================
   LAYOUT — Left/Right Grid
   ============================================================ */
.app-container {
  display: grid;
  grid-template-columns: var(--config-width) 1fr;
  min-height: 100vh;
}

/* ============================================================
   CONFIG PANEL — Left Side
   ============================================================ */
.config-panel {
  background: var(--color-bg-card);
  border-right: 2px solid var(--color-divider);
  padding: 28px 24px 24px;
  overflow-y: auto;
  max-height: 100vh;
  position: sticky;
  top: 0;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.config-panel-header {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--color-divider);
}

.config-panel-header h1 {
  font-family: var(--font-title);
  font-size: 1.35rem;
  font-weight: 900;
  color: var(--color-primary);
  letter-spacing: 0.04em;
}

.config-panel-header .subtitle {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  letter-spacing: 0.03em;
}

/* ============================================================
   TABS — Card Type Switcher
   ============================================================ */
.config-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--color-divider);
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-bg-card);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.tab-button {
  flex: 1;
  padding: 10px 0;
  border: none;
  background: none;
  font-family: var(--font-title);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--color-tab-inactive-text);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
  letter-spacing: 0.04em;
}

.tab-button:hover {
  color: var(--color-text);
  background: var(--color-tab-hover-bg);
}

.tab-button.active {
  color: var(--color-tab-active-bg);
  border-bottom-color: var(--color-tab-active-bg);
  font-weight: 900;
  background: rgba(0,0,0,0.03);
}

/* ============================================================
   CONFIG SECTIONS — With Left Accent Bar
   ============================================================ */
.config-section {
  padding: 16px 0;
  border-bottom: 1px solid var(--color-divider);
}

.config-section:last-child { border-bottom: none; }

.config-section h3 {
  font-family: var(--font-title);
  font-size: 0.95rem;
  font-weight: 900;
  color: var(--color-primary);
  padding-left: 12px;
  border-left: 4px solid var(--color-accent-bar);
  margin-bottom: 14px;
  letter-spacing: 0.03em;
}

.config-section .section-desc {
  font-size: 0.78rem;
  color: var(--color-text-muted);
  margin-bottom: 10px;
  padding-left: 16px;
}

/* ============================================================
   FORM CONTROLS
   ============================================================ */
.form-group {
  margin-bottom: 12px;
}

.form-group:last-child { margin-bottom: 0; }

.form-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--color-text-light);
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

.form-input,
.form-textarea,
.form-select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--color-input-border);
  border-radius: 4px;
  background: var(--color-input-bg);
  color: var(--color-text);
  font-family: var(--font-body);
  font-size: 0.85rem;
  transition: border-color 0.2s, box-shadow 0.2s;
  line-height: 1.5;
}

.form-input:focus,
.form-textarea:focus,
.form-select:focus {
  outline: none;
  border-color: var(--color-input-focus);
  box-shadow: 0 0 0 2px rgba(28,30,33,0.1);
}

.form-textarea {
  min-height: 72px;
  resize: vertical;
}

.form-row {
  display: flex;
  gap: 10px;
}

.form-row .form-group { flex: 1; }

.form-hint {
  font-size: 0.72rem;
  color: var(--color-text-muted);
  margin-top: 3px;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 18px;
  border: none;
  border-radius: 4px;
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.btn:active { transform: translateY(1px); }

/* Primary — Solid Dark */
.btn-primary {
  background: var(--color-button-primary-bg);
  color: var(--color-button-primary-text);
}
.btn-primary:hover {
  background: var(--color-button-primary-hover);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Accent — Red */
.btn-accent {
  background: var(--color-button-accent-bg);
  color: var(--color-button-accent-text);
}
.btn-accent:hover {
  background: var(--color-button-accent-hover);
  box-shadow: 0 2px 8px rgba(140,58,58,0.2);
}

/* Outline */
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--color-button-outline-border);
  color: var(--color-button-outline-text);
}
.btn-outline:hover {
  background: var(--color-button-outline-hover-bg);
}

/* Remove / Danger */
.btn-remove {
  background: transparent;
  color: var(--color-button-remove-text);
  padding: 4px 10px;
  font-size: 0.75rem;
}
.btn-remove:hover {
  background: var(--color-button-remove-hover-bg);
}

/* Small variant */
.btn-sm {
  padding: 4px 10px;
  font-size: 0.75rem;
}

/* ============================================================
   COLLAPSIBLE SECTIONS
   ============================================================ */
.collapse-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  cursor: pointer;
  font-family: var(--font-title);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 0.05em;
  user-select: none;
  border-radius: 4px;
  transition: background 0.15s;
}
.collapse-toggle:hover {
  background: var(--color-section-hover);
}
.collapse-toggle::after {
  content: '\25B8';
  font-size: 0.85rem;
  font-weight: 700;
  transition: transform 0.2s;
  margin-left: 8px;
}
.collapse-toggle.open::after {
  transform: rotate(90deg);
}
.collapse-body {
  display: none;
  padding: 8px 0 12px;
}
.collapse-body.open {
  display: block;
}

/* ============================================================
   INK STYLE PRESET BUTTONS (in config panel)
   ============================================================ */
.ink-style-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}

.ink-style-btn {
  padding: 5px 10px;
  border: 1.5px solid var(--color-border-light);
  border-radius: 4px;
  background: var(--color-input-bg);
  cursor: pointer;
  font-family: var(--font-title);
  font-size: 0.78rem;
  color: var(--color-text-muted);
  transition: all 0.2s;
  letter-spacing: 0.03em;
}

.ink-style-btn:hover {
  border-color: var(--color-primary);
  color: var(--color-text);
}

.ink-style-btn.active {
  background: var(--color-primary);
  color: var(--color-bg-card);
  border-color: var(--color-primary);
}

/* ============================================================
   PALETTE SWATCHES
   ============================================================ */
.palette-swatches {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.palette-swatch {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1.5px solid var(--color-border-light);
  border-radius: 6px;
  background: var(--color-input-bg);
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--color-text);
}

.palette-swatch:hover {
  border-color: var(--color-primary);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.palette-swatch.active {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(28,30,33,0.12);
}

.swatch-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.1);
}

/* ============================================================
   ACTIONS BAR
   ============================================================ */
.actions-bar {
  display: flex;
  gap: 8px;
  padding-top: 12px;
  border-top: 2px solid var(--color-divider);
  flex-wrap: wrap;
}

.actions-bar .btn { flex: 1; min-width: 70px; }

/* ============================================================
   BOTTOM TOOLBAR — Below Card Preview
   ============================================================ */
.bottom-toolbar {
  margin-top: 16px;
  background: var(--color-bg-card);
  border: 2px solid var(--color-border);
  padding: 14px 16px;
}
.bottom-toolbar-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 10px;
}
.bottom-toolbar-row:last-child { margin-bottom: 0; }
.bottom-toolbar-label {
  font-family: var(--font-title);
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 1px;
  margin-right: 8px;
  white-space: nowrap;
}
.bottom-toolbar .btn {
  font-size: 0.72rem;
  padding: 6px 12px;
  white-space: nowrap;
}

/* ============================================================
   SLOT PANEL — Archive Management
   ============================================================ */
.slot-panel {
  border: 1px solid var(--color-border);
  padding: 8px;
  margin-top: 4px;
  max-height: 400px;
  overflow-y: auto;
}
.slot-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px;
  border-bottom: 1px solid var(--color-border-light);
  font-size: 0.75rem;
}
.slot-card:last-child { border-bottom: none; }
.slot-card .slot-num {
  font-weight: 900;
  font-family: var(--font-title);
  font-size: 0.85rem;
  color: var(--color-primary);
  min-width: 48px;
}
.slot-card .slot-info {
  flex: 1;
  min-width: 0;
}
.slot-card .slot-title {
  font-weight: 700;
  color: var(--color-primary);
  font-size: 0.8rem;
}
.slot-card .slot-type {
  display: inline-block;
  font-size: 0.65rem;
  color: var(--color-accent);
  border: 1px solid var(--color-accent);
  padding: 0 4px;
  margin-left: 6px;
}
.slot-card .slot-meta {
  font-size: 0.65rem;
  color: var(--color-text-muted);
  margin-top: 2px;
}
.slot-card .slot-note {
  font-size: 0.68rem;
  color: var(--color-text-light);
  margin-top: 2px;
  font-style: italic;
  cursor: pointer;
}
.slot-card .slot-note:hover { color: var(--color-accent); }
.slot-card .slot-note-edit {
  font-size: 0.68rem;
  padding: 2px 6px;
  border: 1px solid var(--color-accent);
  background: #fff;
  width: 100%;
}
.slot-card .slot-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.slot-card .slot-actions button {
  font-size: 0.65rem;
  padding: 3px 8px;
}

/* ============================================================
   PREVIEW AREA — Right Side
   ============================================================ */
.preview-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 500px;
  padding: 40px 32px;
  gap: 24px;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(0,0,0,0.04) 0%, transparent 70%),
    var(--color-body-bg);
}

.preview-label {
  font-family: var(--font-title);
  font-size: 0.82rem;
  color: var(--color-text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ============================================================
   CARD PREVIEW
   ============================================================ */
.card-preview {
  width: var(--card-width);
  min-height: var(--card-height);
  height: auto;
  background-color: var(--color-bg-card);
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 20px, rgba(0,0,0,0.008) 20px, rgba(0,0,0,0.008) 21px);
  border: 1px solid var(--color-border);
  outline: 2px solid var(--color-border);
  outline-offset: 2px;
  border-radius: 2px;
  box-shadow:
    var(--color-shadow-card),
    var(--color-shadow-inner);
  position: relative;
  display: flex;
  flex-direction: column;
  font-family: var(--font-body);
}

/* ============================================================
   INK WASH BACKGROUND LAYER
   ============================================================ */
.card-ink-bg {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background-size: 100%;
  background-position: center;
  background-repeat: no-repeat;
  transition: all 0.8s ease;
}

/* Preset styles via data attribute on the card */
.card-preview[data-ink-style="水墨"] .card-ink-bg {
  filter: blur(1px) grayscale(0.6) sepia(0.3);
  mix-blend-mode: multiply;
  opacity: 0.2;
}

.card-preview[data-ink-style="青绿"] .card-ink-bg {
  filter: blur(1.5px) sepia(0.4) hue-rotate(30deg) saturate(0.6);
  mix-blend-mode: multiply;
  opacity: 0.18;
}

.card-preview[data-ink-style="朱砂"] .card-ink-bg {
  filter: blur(1px) sepia(0.5) saturate(0.7) hue-rotate(-20deg);
  mix-blend-mode: multiply;
  opacity: 0.2;
}

.card-preview[data-ink-style="古卷"] .card-ink-bg {
  filter: blur(0.5px) sepia(0.7) brightness(0.9);
  mix-blend-mode: multiply;
  opacity: 0.22;
}

.card-preview[data-ink-style="淡墨"] .card-ink-bg {
  filter: blur(2px) grayscale(1) brightness(1.1);
  mix-blend-mode: multiply;
  opacity: 0.15;
}

.card-preview[data-ink-style="霜华"] .card-ink-bg {
  filter: blur(2px) hue-rotate(180deg) saturate(0.3);
  mix-blend-mode: multiply;
  opacity: 0.16;
}

.card-preview[data-ink-style="暮色"] .card-ink-bg {
  filter: sepia(0.6) hue-rotate(-10deg) saturate(0.5) brightness(0.95);
  mix-blend-mode: multiply;
  opacity: 0.22;
}

.card-preview[data-ink-style="烟雨"] .card-ink-bg {
  filter: blur(3px) grayscale(0.8) brightness(1.05);
  mix-blend-mode: multiply;
  opacity: 0.13;
}

.card-preview[data-ink-style="丹青"] .card-ink-bg {
  filter: sepia(0.3) hue-rotate(50deg) saturate(0.5);
  mix-blend-mode: multiply;
  opacity: 0.18;
}

.card-preview[data-ink-style="残卷"] .card-ink-bg {
  filter: blur(0.5px) sepia(0.8) brightness(0.85) contrast(1.1);
  mix-blend-mode: multiply;
  opacity: 0.2;
}

/* When no image: no background layer */
.card-preview:not([data-ink-style]) .card-ink-bg,
.card-preview[data-ink-style="none"] .card-ink-bg {
  display: none;
}

/* ============================================================
   CARD BODY — Equal Left/Right Split (Like Original Demo)
   ============================================================ */
.card-body {
  display: flex;
  flex: 1;
  position: relative;
  z-index: 2;
}

.card-left {
  flex: 1;
  min-width: 0;
  max-width: 50%;
  padding: 24px;
  border-right: 1px dashed var(--color-accent);
  display: flex;
  flex-direction: column;
  gap: 12px;
  font-size: 0.85rem;
}

.card-right {
  flex: 1;
  min-width: 0;
  max-width: 50%;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  font-size: 0.85rem;
}

/* ============================================================
   CARD LEFT — Horizontal Header Row
   ============================================================ */
.card-header-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--color-accent);
  margin-bottom: 14px;
}
.card-header-row .card-name {
  font-family: var(--font-title);
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--color-primary);
  letter-spacing: 0.06em;
  line-height: 1.1;
}
.card-header-row .card-name .rank-suffix {
  font-size: 0.55em;
  font-weight: 400;
  opacity: 0.65;
  margin-left: 0.1em;
}
.card-header-row .card-rank-type {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-size: 0.92rem;
  color: var(--color-text-muted);
  white-space: nowrap;
}
.card-header-row .card-rank-type .rank {
  color: var(--color-text-muted);
}
.card-header-row .card-rank-type .type-info {
  color: var(--color-accent);
  font-weight: 600;
}

/* ---- Meta Fields (scoped to left column) ---- */
.card-left .meta-item {
  display: flex;
  flex-direction: row;
  align-items: baseline;
  gap: 8px;
  padding: 4px 0;
  border-bottom: 1px dotted rgba(0,0,0,0.06);
}

.card-left .meta-label {
  min-width: 5.5em;
  text-align: right;
  flex-shrink: 0;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--color-primary);
}

.card-left .meta-value {
  flex: 1;
  text-align: left;
  font-size: 0.85rem;
  line-height: 1.6;
}

/* ---- Meta Grid (2-column for location cards) ---- */
.card-left .meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
}
.card-left .meta-grid .meta-item {
  flex-direction: column;
  gap: 1px;
  padding: 2px 0;
  border-bottom: 1px dotted rgba(0,0,0,0.06);
}
.card-left .meta-grid .meta-label {
  text-align: left;
  min-width: auto;
}

/* ---- Stronghold: big difficulty number ---- */
.card-left .str-difficulty {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--color-accent);
  font-family: var(--font-title);
}

.card-left .str-ally {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--color-accent);
  font-family: var(--font-title);
}

.ally-chip {
  display: inline-block;
  border: 1px solid var(--color-accent);
  border-left: 3px solid var(--color-accent);
  padding: 4px 8px;
  margin-right: 8px;
  margin-bottom: 6px;
  background: var(--color-accent-light);
  font-size: 0.78rem;
}
.ally-chip-name {
  font-weight: 700;
  color: var(--color-primary);
  display: block;
}
.ally-chip-desc {
  display: block;
  font-size: 0.72rem;
  font-style: italic;
  color: var(--color-text-light);
  margin-top: 3px;
  margin-bottom: 8px;
  line-height: 1.5;
  padding-left: 4px;
}

/* ---- Stronghold: section breathing room ---- */
.meta-section-gap {
  height: 12px;
}

/* ---- Stronghold: description with emphasis ---- */
.card-left .stronghold-desc {
  font-size: 0.9rem;
  line-height: 1.8;
  padding: 10px 0;
  border-left: 3px solid var(--color-accent);
  padding-left: 12px;
  margin: 8px 0;
}

/* ============================================================
   CARD LEFT — Description / Tendencies (in left column)
   ============================================================ */
.card-description {
  font-style: italic;
  line-height: 1.7;
  color: var(--color-text);
  font-size: 0.88rem;
  padding: 8px 0;
  border-left: 3px solid var(--color-accent);
  padding-left: 12px;
}

mark {
  background: var(--color-accent-light);
  color: var(--color-accent);
  padding: 0 3px;
  font-weight: 600;
}

.card-tendencies {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--color-primary);
}

.faction-bar-bottom {
  margin-top: auto;
  padding-top: 8px;
}

/* ============================================================
   CARD TRAITS — Inside Card Preview
   ============================================================ */
.card-traits {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card-trait-item {
  padding: 10px 14px;
  background: var(--color-trait-bg);
  border: 1px solid var(--color-trait-border);
  border-radius: 4px;
  font-size: 0.82rem;
}

.card-trait-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.card-trait-name {
  font-weight: 900;
  color: var(--color-primary);
  font-family: var(--font-title);
  font-size: 0.9rem;
}

.card-trait-type {
  font-size: 0.68rem;
  font-weight: 600;
  padding: 1px 8px;
  border-radius: 3px;
  color: var(--color-accent);
  border: 1px solid var(--color-accent);
  letter-spacing: 0.04em;
}

.card-trait-source {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--color-text-muted);
  letter-spacing: 0.04em;
}

.card-trait-cost {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--color-accent);
  margin-left: auto;
  white-space: nowrap;
  letter-spacing: 0.03em;
}

.card-trait-desc {
  color: var(--color-text-light);
  line-height: 1.5;
  font-size: 0.82rem;
}

.card-trait-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.68rem;
  color: var(--color-text-muted);
  margin-top: 2px;
}

/* Trait SVG circle wrapper — clickable */
.trait-circle-wrap {
  display: inline-flex;
  align-items: center;
  cursor: pointer;
  flex-shrink: 0;
}

.trait-flavor {
  display: block;
  margin-top: 4px;
  padding: 4px 0 4px 10px;
  border-left: 2px solid var(--color-accent);
  font-style: italic;
  font-size: 0.8rem;
  color: var(--color-text-light);
  line-height: 1.5;
}
.trait-flavor strong { font-weight: 700; color: var(--color-primary); }
.trait-flavor em { font-style: italic; }

/* Trait type tag color variants */
.card-trait-type.type-passive  { color: var(--color-text-muted); border-color: var(--color-text-muted); }
.card-trait-type.type-reaction { color: #C09040; border-color: #C09040; }
.card-trait-type.type-active   { color: var(--color-accent); border-color: var(--color-accent); }

/* ============================================================
   CARD TRAITS SECTION TITLE
   ============================================================ */
.card-traits-title {
  font-size: 0.78rem; font-weight: 700; color: var(--color-text-muted);
  text-align: center; letter-spacing: 2px; margin-bottom: 2px;
}

/* ============================================================
   FACTION RELATIONS BAR
   ============================================================ */
.faction-relations { padding-bottom: 8px; border-bottom: 1px dashed var(--color-text-muted); }
.faction-relations-title {
  font-size: 0.78rem; font-weight: 700; color: var(--color-text-muted);
  text-align: center; letter-spacing: 2px; margin-bottom: 6px;
}
.faction-track {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 2px;
  font-size: 0.7rem; font-weight: 600; padding: 6px 4px;
  background: linear-gradient(to right,
    var(--color-hostile-light),
    rgba(0,0,0,0.03) 22%,
    rgba(0,0,0,0.03) 44%,
    rgba(0,0,0,0.03) 56%,
    var(--color-friendly-light) 78%,
    var(--color-friendly-light));
  border: 1px solid var(--color-border);
}
.faction-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  padding: 2px 3px;
  transition: all 0.15s;
  user-select: none;
  height: 40px;
  justify-content: center;
}
.faction-node .dot {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--color-text-muted);
  background: transparent;
  transition: all 0.15s;
  flex-shrink: 0;
}
.faction-node.selected .dot {
  background: var(--color-accent);
  border-color: var(--color-accent);
  transform: scale(1.15);
  outline: 2px solid var(--color-accent);
  outline-offset: 1px;
}
.faction-node.hostile { color: var(--color-hostile); }
.faction-node.neutral { color: var(--color-text-muted); }
.faction-node.friendly { color: var(--color-friendly); }

/* ============================================================
   TRAITS EDITOR — Config Panel
   ============================================================ */
.trait-edit-box {
  border: 1px solid var(--color-border);
  padding: 12px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.5);
}

.trait-edit-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
}

.traits-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.trait-editor-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--color-trait-bg);
  border: 1px solid var(--color-trait-border);
  border-radius: 4px;
  font-size: 0.78rem;
}

.trait-editor-item .trait-info {
  flex: 1;
  min-width: 0;
}

.trait-editor-item .trait-info strong {
  display: block;
  color: var(--color-primary);
  font-size: 0.82rem;
}

.trait-editor-item .trait-info span {
  color: var(--color-text-muted);
  font-size: 0.7rem;
}

.trait-editor-actions {
  display: flex;
  gap: 4px;
}

.btn-add-trait {
  width: 100%;
  padding: 8px;
  border: 1.5px dashed var(--color-border-light);
  border-radius: 4px;
  background: transparent;
  color: var(--color-text-muted);
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.8rem;
  transition: border-color 0.2s, color 0.2s;
}

.btn-add-trait:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
}

/* ============================================================
   SWATCH COLOR BAR & CUSTOM PALETTE PICKERS
   ============================================================ */
.swatch-bar {
  display: inline-flex;
  width: 34px;
  height: 14px;
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.12);
}
.swatch-bar span { display: block; height: 100%; }

.swatch-dot-multi {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.12);
}

.custom-palette-pickers {
  margin-top: 12px;
  padding: 10px 8px;
  background: var(--color-trait-bg);
  border: 1px solid var(--color-trait-border);
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.color-picker-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.color-picker-row .cp-label {
  width: 36px;
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--color-text-light);
  flex-shrink: 0;
  letter-spacing: 0.03em;
}

.color-picker-row input[type="color"] {
  width: 32px;
  height: 26px;
  border: 1px solid var(--color-input-border);
  border-radius: 4px;
  cursor: pointer;
  padding: 2px;
  background: var(--color-input-bg);
  flex-shrink: 0;
}

.color-picker-row input[type="text"] {
  flex: 1;
  padding: 4px 7px;
  border: 1px solid var(--color-input-border);
  border-radius: 4px;
  font-family: var(--font-body);
  font-size: 0.78rem;
  color: var(--color-text);
  background: var(--color-input-bg);
  min-width: 0;
}

.color-picker-row input[type="text"]:focus {
  outline: none;
  border-color: var(--color-input-focus);
}

/* ============================================================
   TYPE-SPECIFIC SECTIONS (shown/hidden by JS)
   ============================================================ */
.type-section { display: none; }
.type-section.active { display: block; }

/* ============================================================
   OTHER RELATIONS — Config Panel rows + Card preview chips
   ============================================================ */
.other-rel-row {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 8px 10px;
  border: 1px solid var(--color-border-light);
  border-left: 3px solid var(--color-accent);
  margin-bottom: 6px;
  background: rgba(255,255,255,0.35);
}
.other-rel-row.character {
  border-left-color: #8B6D3A;
}
.other-rel-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border: 1px solid var(--color-border);
  font-size: 0.75rem;
  margin-right: 6px;
  margin-bottom: 4px;
}
.other-rel-chip .rel-type {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 0 4px;
}
.other-rel-chip.faction .rel-type { background: var(--color-accent-light); color: var(--color-accent); }
.other-rel-chip.character .rel-type { background: rgba(139,109,58,0.15); color: #8B6D3A; }

/* Drag handle for other-relation rows */
.other-rel-row .drag-handle {
  cursor: grab;
  color: var(--color-text-muted);
  font-size: 0.85rem;
  padding: 0 4px;
  user-select: none;
}
.other-rel-row.dragging {
  opacity: 0.4;
}
.other-rel-row.drag-over {
  border-top: 2px solid var(--color-accent);
}

/* Relation value colored badges */
.other-rel-chip .rel-value {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 3px;
}
.rel-value.deadly { background: rgba(140,58,58,0.2); color: #8C3A3A; }
.rel-value.war { background: rgba(180,80,80,0.18); color: #A04040; }

.rel-value.friendly { background: rgba(80,140,80,0.18); color: #508050; }

/* ============================================================
   IMAGE EDITOR MODAL (Simplified for ink wash)
   ============================================================ */
.editor-modal-overlay {
  position: fixed;
  z-index: 2000;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.editor-modal-content {
  background: var(--color-bg-card);
  border: 2px solid var(--color-border);
  border-radius: 4px;
  padding: 28px;
  width: 90%;
  max-width: 820px;
  display: flex;
  gap: 28px;
  box-shadow: 0 8px 48px rgba(0, 0, 0, 0.35);
}
.editor-preview-pane {
  flex: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-body-bg);
  min-height: 380px;
  border-radius: 4px;
  border: 1px solid var(--color-border-light);
  position: relative;
  overflow: hidden;
}
.editor-frame {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 380px;
  overflow: hidden;
}
.editor-frame .editor-ink-preview {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 0.3s;
}
.editor-controls-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 180px;
}
.editor-controls-pane label {
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--color-text-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.editor-controls-pane label span {
  font-weight: 400;
  color: var(--color-text-muted);
  font-size: 0.72rem;
}
.editor-controls-pane input[type="range"] {
  width: 100%;
  accent-color: var(--color-accent);
}
.editor-controls-pane .editor-buttons {
  display: flex;
  gap: 8px;
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid var(--color-divider);
}
.editor-controls-pane .editor-buttons .btn { flex: 1; }

/* ============================================================
   BEAUTIFY PANEL — Floating right-side panel
   ============================================================ */
.beautify-panel-toggle {
  position: fixed;
  right: 0;
  top: calc(38% + 90px);
  transform: translateY(-50%);
  z-index: 498;
  writing-mode: vertical-rl;
  padding: 12px 8px;
  background: var(--color-accent);
  color: #fff;
  font-family: var(--font-title);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 4px;
  cursor: pointer;
  border: 2px solid var(--color-border);
  border-right: none;
  transition: right 0.3s;
}
.beautify-panel-toggle.open { right: 280px; }

.beautify-panel {
  position: fixed;
  right: -290px;
  top: 0;
  bottom: 0;
  width: 280px;
  z-index: 497;
  background: var(--color-bg-card);
  border-left: 2px solid var(--color-border);
  box-shadow: -4px 0 20px rgba(0,0,0,0.15);
  transition: right 0.3s;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 16px;
}
.beautify-panel.open { right: 0; }

/* ============================================================
   RESPONSIVE — Single Column Below 1100px
   ============================================================ */
@media (max-width: 1100px) {
  .app-container {
    grid-template-columns: 1fr;
  }

  .config-panel {
    position: relative;
    max-height: none;
    border-right: none;
    border-bottom: 2px solid var(--color-divider);
    padding: 20px 16px;
    gap: 20px;
  }

  .card-preview {
    width: 100%;
    max-width: var(--card-width);
    height: auto;
    aspect-ratio: 9 / 6;
  }

  .card-left,
  .card-right {
    padding: 18px;
  }

  .card-name { font-size: 1.6rem; }
}

@media (max-width: 600px) {
  .card-preview {
    aspect-ratio: auto;
    min-height: 420px;
  }

  .card-body {
    flex-direction: column;
  }

  .card-left {
    border-right: none;
    border-bottom: 1px dashed var(--color-accent);
  }

  .actions-bar { flex-direction: column; }
}

/* ============================================================
   PRINT STYLES — Physical Card Output
   ============================================================ */
@media print {
  @page {
    size: 88mm 63mm landscape;
    margin: 2mm;
  }

  html, body {
    background: white !important;
    margin: 0;
    padding: 0;
  }

  body::before { display: none !important; }

  /* Hide ALL UI */
  .config-panel, .config-panel-header, .config-tabs, .actions-bar,
  .gm-panel, .gm-panel-toggle, #imageEditorModal, #configPanel,
  .collapse-toggle, .collapse-body, .preview-label, .bottom-toolbar,
  .beautify-panel-toggle, .beautify-panel {
    display: none !important;
  }

  .app-container {
    display: block !important;
    max-width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  .preview-area {
    position: static !important;
    margin: 0 !important;
    padding: 0 !important;
    background: white !important;
  }

  .card-preview {
    width: 88mm !important;
    height: 63mm !important;
    min-height: auto !important;
    box-shadow: none !important;
    outline: none !important;
    border: 1px solid #000 !important;
    padding: 3mm !important;
    font-size: 6pt !important;
    background-image: none !important;
    page-break-inside: avoid;
  }

  .card-preview::before { display: none !important; }
  .card-ink-bg { display: none !important; }

  .card-header-row { padding-bottom: 1mm !important; margin-bottom: 2mm !important; }
  .card-header-row .card-name { font-size: 11pt !important; }
  .card-header-row .card-rank-type { font-size: 6pt !important; }

  .card-body { flex-direction: row !important; gap: 2mm !important; }
  .card-left, .card-right {
    flex: 1 !important;
    padding: 1mm !important;
    max-width: 50% !important;
    gap: 1mm !important;
  }
  .card-left { border-right: 1px dashed #999 !important; }
  .card-left::after { display: none !important; }

  .meta-label { font-size: 5pt !important; }
  .meta-value { font-size: 6pt !important; }
  .card-description { font-size: 6pt !important; border-left-width: 1px !important; padding-left: 1mm !important; }
  .stronghold-desc { font-size: 6pt !important; border-left-width: 1px !important; padding-left: 1mm !important; }
  .card-tendencies { font-size: 6pt !important; }

  .card-trait-name { font-size: 6pt !important; }
  .card-trait-type { font-size: 5pt !important; }
  .card-trait-cost { font-size: 5.5pt !important; }
  .card-trait-desc { font-size: 5.5pt !important; }
  .trait-flavor { font-size: 5pt !important; border-left-width: 1px !important; }

  .faction-track { font-size: 4.5pt !important; padding: 1mm !important; }
  .faction-node .dot { width: 2mm !important; height: 2mm !important; }
  .faction-node.selected .dot { transform: scale(1.1) !important; outline-width: 1px !important; }
}

<div class="app-container">

  <!-- ============================================================
       CONFIG PANEL — Left Side
       ============================================================ -->
  <aside class="config-panel" id="configPanel">

    <div class="config-panel-header">
      <h1>逆命仙途制卡器</h1>
      <span class="subtitle">环境 / 势力 / 地点</span>

    <!-- Card Type Tabs -->

      <button class="tab-button" data-type="faction">势力</button>

    <!-- Basic Info Section -->

    <!-- Type-Specific: Environment -->

      <h3>环境属性</h3>

      </div>
      <div class="form-group">
        <label class="form-label">环境潜在风险</label>
        <input type="text" class="form-input" id="inputEnvRisks" value="血魔狼、赤红鹰、鲜血巨蟒" placeholder="以顿号分隔" oninput="updateState('envRisks', this.value)">
      </div>
    </div>

    <!-- Type-Specific: Faction -->
    <div class="config-section type-section" id="facSection" data-type="faction">

            <option value="4">无关</option>

            <option value="6">友善</option>
            <option value="7">合作</option>

      <div class="form-group">

      <div class="form-group">
        <label class="form-label">谜团</label>
        <input type="text" class="form-input" id="inputLocMysteries" placeholder="以顿号分隔" oninput="updateState('locMysteries', this.value)">

      <div class="form-group">

    <!-- Type-Specific: Stronghold -->

  </aside>

  <main class="preview-area" id="previewArea">

  </main>

</div>

<script>
'use strict';

/* ============================================================
   DEFAULT STATE — Full Schema
   ============================================================ */
const DefaultState = {
  cardType: 'environment',
  name: '',
  rank: '凡阶',
  description: '',
  tendencies: '',

  /* Environment specific */
  envType: '险境',
  envDifficulty: 10,
  envRisks: '',

  /* Faction specific */
  facDifficulty: 12,
  facRisks: '',
  facAllies: '',
  facRelation: -1,
  facOtherRelations: [],

  /* Location specific */
  locTerrain: '',
  locTheme: '',
  locFactions: '',
  locEnvs: '',
  locDangers: '',
  locDiscoveries: '',
  locNemesis: '',
  locMysteries: '',
  locMainEvents: '',    // 主要事件
  locTruth: '',         // 谜底（谜团的真相）

  /* Stronghold specific */
  strDifficulty: 10,
  strAllies: [],

  /* Traits */
  traits: [],

  /* Image — Ink Wash System */
  image: {
    src: '',
    inkStyle: 'none',
    opacity: 0.18,
    posX: 50,
    posY: 50,
    scale: 100
  },

  /* Appearance */
  palette: 'ink',
  customColors: {
    primary: '#1C1E21',
    accent: '#8C3A3A',
    bgCard: '#F4F1EA',
    text: '#2B2B2B'
  }
};

/* ============================================================
   CARD STATE — Deep Clone of DefaultState
   ============================================================ */
function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

let CardState = deepClone(DefaultState);

/* ============================================================
   UTILITY — Parse Markdown-like Syntax
   Supports: ==highlight==  **bold**  *italic*  newlines-><br>
   ============================================================ */
function parseMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  html = html.replace(/==(.+?)==/g, '<mark>$1</mark>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

/* ============================================================
   UTILITY — SVG Trait Circle
   ============================================================ */
function traitCircleSVG(status) {
  if (status === 'active') {
    return '<svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="var(--color-accent)" stroke="var(--color-accent)" stroke-width="1.5"/></svg>';
  } else if (status === 'crossed') {
    return '<svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="var(--color-text-muted)" stroke-width="1.5"/><line x1="4" y1="4" x2="12" y2="12" stroke="var(--color-accent)" stroke-width="1.5"/><line x1="12" y1="4" x2="4" y2="12" stroke="var(--color-accent)" stroke-width="1.5"/></svg>';
  }
  return '<svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="var(--color-text-muted)" stroke-width="1.5"/></svg>';
}

const RELATION_LABELS = ['死敌','交战','敌对','不和','无关','相识','友善','合作','同盟'];

/** Map relation text to CSS class for colored badge */
function getRelClass(relation) {
  var map = {
    '死敌':'deadly', '交战':'war', '敌对':'hostile', '不和':'unfriendly',
    '无关':'neutral', '相识':'acquaintance', '友善':'friendly',
    '合作':'cooperative', '同盟':'allied'
  };
  return map[relation] || 'neutral';
}

function renderFactionBar() {
  var html = '<div class="faction-relations">';
  html += '<div class="faction-relations-title">—— 当前势力关系 ——</div>';
  html += '<div class="faction-track">';
  for (var i = 0; i < RELATION_LABELS.length; i++) {
    var label = RELATION_LABELS[i];
    var cssClass = 'faction-node';
    if (i === CardState.facRelation) cssClass += ' selected';
    if (i <= 3) cssClass += ' hostile';
    else if (i === 4) cssClass += ' neutral';
    else cssClass += ' friendly';
    html += '<div class="' + cssClass + '" onclick="updateFactionRelation(' + i + ')">';
    html += '<div class="dot"></div>';
    html += '<span>' + label + '</span>';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function updateFactionRelation(index) {
  CardState.facRelation = CardState.facRelation === index ? -1 : index;
  var input = document.getElementById('inputFacRelation');
  if (input) input.value = CardState.facRelation;
  renderCardPreview();
}

/* ============================================================
   OTHER RELATIONS — Faction Custom Relationships
   ============================================================ */
function renderOtherRelations() {
  var container = document.getElementById('facOtherRelations');
  if (!container) return;

  // Auto-sort: faction first, then character, then custom
  CardState.facOtherRelations.sort(function(a, b) {
    var order = { faction: 0, character: 1 };
    var aOrd = order[a.targetType] != null ? order[a.targetType] : 2;
    var bOrd = order[b.targetType] != null ? order[b.targetType] : 2;
    if (aOrd !== bOrd) return aOrd - bOrd;
    return 0;
  });

  var html = '';
  CardState.facOtherRelations.forEach(function(rel, i) {
    var rowClass = 'other-rel-row ' + (rel.targetType === 'character' ? 'character' : 'faction');
    html += '<div class="' + rowClass + '" draggable="true" ondragstart="dragOtherRel(event, ' + i + ')" ondragover="dragOverOtherRel(event)" ondragleave="dragLeaveOtherRel(event)" ondrop="dropOtherRel(event, ' + i + ')" ondragend="dragEndOtherRel(event)">';
    // Drag handle
    html += '<span class="drag-handle">⠿</span>';
    // Type toggle with custom support
    var isCustom = (rel.targetType !== 'faction' && rel.targetType !== 'character');
    html += '<select onchange="updateOtherRelType(' + i + ', this.value)" style="flex:1; font-size:0.72rem;">';
    html += '<option value="faction" ' + (rel.targetType==='faction'?'selected':'') + '>势力</option>';
    html += '<option value="character" ' + (rel.targetType==='character'?'selected':'') + '>人物</option>';
    html += '<option value="__custom__" ' + (isCustom?'selected':'') + '>+ 自定义</option>';
    html += '</select>';
    // Name input
    html += '<input type="text" value="' + escAttr(rel.targetName || '') + '" oninput="updateOtherRel(' + i + ', \'targetName\', this.value)" placeholder="名称" style="flex:2; font-size:0.72rem;">';
    // Relation dropdown
    html += '<select onchange="updateOtherRel(' + i + ', \'relation\', this.value)" style="flex:1; font-size:0.72rem;">';
    ['死敌','交战','敌对','不和','无关','相识','友善','合作','同盟'].forEach(function(r) {
      html += '<option value="' + r + '" ' + (rel.relation===r?'selected':'') + '>' + r + '</option>';
    });
    html += '</select>';
    // Delete
    html += '<button onclick="removeOtherRelation(' + i + ')" class="btn-remove" style="font-size:0.65rem;">×</button>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function addOtherRelation() {
  if (!CardState.facOtherRelations) CardState.facOtherRelations = [];
  CardState.facOtherRelations.push({ targetType: 'faction', targetName: '', relation: '无关' });
  renderOtherRelations();
  renderCardPreview();
}

function updateOtherRel(index, field, value) {
  CardState.facOtherRelations[index][field] = value;
  renderCardPreview();
}

function updateOtherRelType(index, value) {
  if (value === '__custom__') {
    var custom = prompt('输入自定义类型（1-3个字）：', '');
    if (custom && custom.trim()) {
      CardState.facOtherRelations[index].targetType = custom.trim().substring(0, 3);
    } else {
      CardState.facOtherRelations[index].targetType = '其他';
    }
  } else {
    CardState.facOtherRelations[index].targetType = value;
  }
  renderOtherRelations();
  renderCardPreview();
}

function removeOtherRelation(index) {
  CardState.facOtherRelations.splice(index, 1);
  renderOtherRelations();
  renderCardPreview();
}

/* Drag-and-drop for other relations */
var dragOtherRelIndex = -1;

function dragOtherRel(e, index) {
  dragOtherRelIndex = index;
  e.target.closest('.other-rel-row').classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', index);
}

function dragOverOtherRel(e) {
  e.preventDefault();
  e.target.closest('.other-rel-row').classList.add('drag-over');
}

function dragLeaveOtherRel(e) {
  e.target.closest('.other-rel-row').classList.remove('drag-over');
}

function dropOtherRel(e, targetIndex) {
  e.preventDefault();
  e.target.closest('.other-rel-row').classList.remove('drag-over');
  if (dragOtherRelIndex < 0 || dragOtherRelIndex === targetIndex) return;
  var arr = CardState.facOtherRelations;
  var moved = arr.splice(dragOtherRelIndex, 1)[0];
  arr.splice(targetIndex, 0, moved);
  dragOtherRelIndex = -1;
  renderOtherRelations();
  renderCardPreview();
}

function dragEndOtherRel(e) {
  e.target.closest('.other-rel-row').classList.remove('dragging');
  document.querySelectorAll('.other-rel-row.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
  dragOtherRelIndex = -1;
}

      html += '<button onclick="setInkStyle(\'' + s.id + '\'); renderBeautifyContent();" class="btn btn-outline"' + active + ' style="font-size:0.65rem; padding:6px;">' + s.name + '</button>';
    });
    html += '</div>';

    // Opacity + scale sliders
    html += '<div style="margin-top:8px;">';
    html += '<label style="font-size:0.7rem;">透明度 <span id="inkOpacityVal">' + Math.round((CardState.image.opacity || 0.18) * 100) + '%</span></label>';
    html += '<input type="range" min="5" max="40" value="' + Math.round((CardState.image.opacity || 0.18) * 100) + '" oninput="updateInkOpacityBeautify(this.value)" style="width:100%;">';
    html += '</div>';
    html += '<div style="margin-top:4px;">';
    html += '<label style="font-size:0.7rem;">缩放 <span id="inkScaleVal">' + (CardState.image.scale || 100) + '%</span></label>';
    html += '<input type="range" min="50" max="200" value="' + (CardState.image.scale || 100) + '" oninput="updateInkScaleBeautify(this.value)" style="width:100%;">';
    html += '</div>';

    // Position editor button
    if (CardState.image.src && CardState.image.inkStyle !== 'none') {
      html += '<button class="btn btn-outline btn-sm" onclick="openImageEditor()" style="width:100%;margin-top:6px;">调整图片位置</button>';
    }

  content.innerHTML = html;

function colorPickerHTML2(label, value, cssVar) {

}

function updateInkOpacityBeautify(val) {
  CardState.image.opacity = val / 100;
  document.getElementById('inkOpacityVal').textContent = val + '%';
  renderCardPreview();

function updateInkScaleBeautify(val) {

/* ============================================================
   SLOT PANEL — Toggle, Render, Edit Note, Save/Load
   ============================================================ */

function toggleSlotPanel() {
  var panel = document.getElementById('slotPanel');
  var toggle = document.getElementById('slotPanelToggle');
  var isOpen = panel.style.display === 'block';
  if (isOpen) {
    panel.style.display = 'none';
    toggle.textContent = '展开槽位 ▸';
  } else {
    renderSlotPanel();
    panel.style.display = 'block';
    toggle.textContent = '收起槽位 ▾';
  }
}

function renderSlotPanel() {
  var panel = document.getElementById('slotPanel');
  if (!panel) return;

  var promises = [];
  for (var i = 1; i <= 10; i++) {
    promises.push((function(slotNum) {
      return getSlotInfo(slotNum).then(function(info) {
        var cardHtml = '<div class="slot-card">';
        cardHtml += '<span class="slot-num">槽位 ' + slotNum + '</span>';
        cardHtml += '<div class="slot-info">';
        if (info) {
          var typeLabels = { environment: '环境', faction: '势力', location: '地点', stronghold: '据点' };
          var typeLabel = typeLabels[info.cardType] || info.cardType;
          cardHtml += '<span class="slot-title">' + escHtml(info.name || '未命名') + '</span>';
          cardHtml += '<span class="slot-type">' + typeLabel + '</span>';
          cardHtml += '<div class="slot-meta">' + formatTime(info.timestamp) + '</div>';
          cardHtml += '<div class="slot-note" id="slotNote_' + slotNum + '" onclick="editSlotNote(' + slotNum + ')">';
          cardHtml += (info.note ? '备注: ' + escHtml(info.note) : '+ 添加备注');
          cardHtml += '</div>';
        } else {
          cardHtml += '<span class="slot-title" style="color:var(--color-text-muted);">空槽位</span>';
        }
        cardHtml += '</div>';
        cardHtml += '<div class="slot-actions">';
        cardHtml += '<button class="btn btn-primary" onclick="saveToSlot(' + slotNum + ')">保存当前</button>';
        if (info) {
          cardHtml += '<button class="btn btn-outline" onclick="loadFromSlot(' + slotNum + ')">载入</button>';
          cardHtml += '<button class="btn btn-outline" onclick="clearSlot(' + slotNum + ')" style="color:var(--color-accent);">删除</button>';
        }
        cardHtml += '</div>';
        cardHtml += '</div>';
        return { slotNum: slotNum, html: cardHtml };
      });
    })(i));
  }

  Promise.all(promises).then(function(results) {
    results.sort(function(a, b) { return a.slotNum - b.slotNum; });
    var html = '';
    results.forEach(function(r) { html += r.html; });
    panel.innerHTML = html;
  });
}

function editSlotNote(slotNum) {
  getSlotInfo(slotNum).then(function(info) {
    if (!info) return;

    var noteEl = document.getElementById('slotNote_' + slotNum);
    if (!noteEl) return;

    var currentNote = info.note || '';
    noteEl.innerHTML = '<input type="text" class="slot-note-edit" id="slotNoteInput_' + slotNum + '" value="' + escAttr(currentNote) + '" placeholder="添加备注...">';

    var input = document.getElementById('slotNoteInput_' + slotNum);
    input.focus();
    input.select();

    function saveNote() {
      var newNote = input.value.trim();
      info.note = newNote;
      var slotData = {
        slotNum: slotNum,
        name: info.name,
        cardType: info.cardType,
        timestamp: info.timestamp,
        note: newNote,
        data: info.data
      };
      openDB().then(function() {
        return new Promise(function(resolve, reject) {
          var tx = _db.transaction('slots', 'readwrite');
          var store = tx.objectStore('slots');
          store.put(slotData);
          tx.oncomplete = function() { renderSlotPanel(); resolve(); };
          tx.onerror = function() { reject(tx.error); };
        });
      });
    }

    input.addEventListener('blur', saveNote);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { renderSlotPanel(); }
    });
  });
}

/* ============================================================
   DATA SLOTS - IndexedDB Backend
   ============================================================ */

var DB_NAME = 'xianxia_card_maker';
var DB_VERSION = 1;
var _db = null;

function openDB() {
  return new Promise(function(resolve, reject) {
    if (_db) { resolve(_db); return; }
    var request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('slots')) {
        db.createObjectStore('slots', { keyPath: 'slotNum' });
      }
      if (!db.objectStoreNames.contains('active')) {
        db.createObjectStore('active', { keyPath: 'type' });
      }
    };
    request.onsuccess = function(e) {
      _db = e.target.result;
      resolve(_db);
    };
    request.onerror = function(e) {
      reject(e.target.error);
    };
  });
}

function formatTime(ts) {
  var d = new Date(ts);
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function getSlotInfo(slotNum) {
  return openDB().then(function() {
    return new Promise(function(resolve, reject) {
      var tx = _db.transaction('slots', 'readonly');
      var store = tx.objectStore('slots');
      var request = store.get(slotNum);
      request.onsuccess = function() { resolve(request.result || null); };
      request.onerror = function() { reject(request.error); };
    });
  }).catch(function(e) {
    console.error('getSlotInfo error:', e);
    return null;
  });
}

function saveToSlot(slotNum) {
  try {
    return openDB().then(function() {
      return getSlotInfo(slotNum).then(function(existing) {
        var slotData = {
          slotNum: slotNum,
          name: CardState.name || '未命名',
          cardType: CardState.cardType,
          timestamp: Date.now(),
          note: existing ? (existing.note || '') : '',
          data: JSON.parse(JSON.stringify(CardState))
        };
        return new Promise(function(resolve, reject) {
          var tx = _db.transaction('slots', 'readwrite');
          var store = tx.objectStore('slots');
          store.put(slotData);
          tx.oncomplete = function() {
            renderSlotPanel();
            renderBottomToolbar();
            resolve();
          };
          tx.onerror = function() { reject(tx.error); };
        });
      });
    }).catch(function(e) {
      console.error('saveToSlot error:', e);
      alert('保存失败：' + e.message);
    });
  } catch(e) {
    alert('保存失败：' + e.message);
  }
}

function updateSlotSummary() {
  openDB().then(function() {
    return new Promise(function(resolve, reject) {
      var tx = _db.transaction('slots', 'readonly');
      var store = tx.objectStore('slots');
      var request = store.count();
      request.onsuccess = function() { resolve(request.result); };
      request.onerror = function() { reject(request.error); };
    });
  }).then(function(filled) {
    var summaryEl = document.getElementById('slotSummary');
    if (summaryEl) summaryEl.textContent = filled + '/10 已用';
  }).catch(function(e) {
    console.error('updateSlotSummary error:', e);
  });
}

function loadFromSlot(slotNum) {
  getSlotInfo(slotNum).then(function(slotData) {
    if (!slotData) { alert('槽位为空'); return; }
    if (!slotData.data) { alert('槽位数据损坏'); return; }
    var loaded = slotData.data;
    // Backward compatibility: convert old string-format strAllies to array
    if (typeof loaded.strAllies === 'string') {
      loaded.strAllies = loaded.strAllies ? [{ name: loaded.strAllies, desc: '' }] : [];
    }
    Object.keys(loaded).forEach(function(k) {
      CardState[k] = loaded[k];
    });
    if (loaded.image && loaded.image.src) {
      CardState.image = JSON.parse(JSON.stringify(loaded.image));
    }
    if (loaded.customColors) {
      CardState.customColors = JSON.parse(JSON.stringify(loaded.customColors));
    }
    if (loaded.traits) {
      CardState.traits = JSON.parse(JSON.stringify(loaded.traits));
    }
    applyPalette(CardState.palette);
    render();
  }).catch(function(e) {
    console.error('loadFromSlot error:', e);
    alert('槽位数据读取失败：' + e.message);
  });
}

function clearSlot(slotNum) {
  openDB().then(function() {
    return new Promise(function(resolve, reject) {
      var tx = _db.transaction('slots', 'readwrite');
      var store = tx.objectStore('slots');
      store.delete(slotNum);
      tx.oncomplete = function() {
        updateSlotSummary();
        if (document.getElementById('slotPanel').style.display === 'block') {
          renderSlotPanel();
        }
        resolve();
      };
      tx.onerror = function() { reject(tx.error); };
    });
  }).catch(function(e) {
    console.error('clearSlot error:', e);
  });
}

/** Main card preview renderer */
function renderCardPreview() {
  var card = document.getElementById('cardPreview');
  var inkBg = document.getElementById('cardInkBg');

  // Ink wash background
  if (card) {
    card.setAttribute('data-ink-style', CardState.image.inkStyle || 'none');
  }
  if (inkBg) {
    if (CardState.image.src && CardState.image.inkStyle !== 'none') {
      inkBg.style.backgroundImage = 'url(' + escAttr(CardState.image.src) + ')';
      inkBg.style.opacity = CardState.image.opacity;
      inkBg.style.backgroundPosition = CardState.image.posX + '% ' + CardState.image.posY + '%';
      inkBg.style.backgroundSize = (CardState.image.scale || 100) + '%';
    } else {
      inkBg.style.backgroundImage = '';
      inkBg.style.opacity = '';
      inkBg.style.backgroundPosition = '';
      inkBg.style.backgroundSize = '';
    }
  }

  // Build left + right columns
  var cardLeft = document.getElementById('cardLeft');
  if (cardLeft) cardLeft.innerHTML = renderCardLeftContent();

  // Right column content
  var cardRight = document.getElementById('cardRight');
  if (cardRight) cardRight.innerHTML = renderCardRightContent();
}

/** Render left column: horizontal header + meta fields + description + tendencies */
function renderCardLeftContent() {
  var typeLabels = { environment: '环境', faction: '势力', location: '地点', stronghold: '据点' };

  /* Meta item helper — returns empty string if value is blank */
  function metaItem(label, value, useMarkdown) {
    if (value == null || value === '') return '';
    var renderedValue = useMarkdown ? parseMarkdown(String(value)) : escapeHTML(String(value));
    return '<div class="meta-item">' +
      '<span class="meta-label">' + escapeHTML(label) + '</span>' +
      '<span class="meta-value">' + renderedValue + '</span>' +
      '</div>';
  }

  var html = '';

  // ---- Horizontal header: name·rank | type+info ----
  var typeInfo = '';
  switch (CardState.cardType) {
    case 'environment':
      typeInfo = (CardState.envType || '险境') + ' · 难度 ' + (CardState.envDifficulty || 0);
      break;
    case 'faction':
      typeInfo = '势力 · 难度 ' + (CardState.facDifficulty || 0);
      break;
    case 'location':
      typeInfo = '地点';
      break;
    case 'stronghold':
      typeInfo = '据点 · 难度 ' + (CardState.strDifficulty || 0);
      break;
  }

  var nameDisplay = CardState.name || '未命名';
  var rankDisplay = CardState.rank || '';
  var nameHTML = escHtml(nameDisplay) + (rankDisplay ? '<span class="rank-suffix">·' + escHtml(rankDisplay) + '</span>' : '');

  html += '<div class="card-header-row">';
  html += '<span class="card-name">' + nameHTML + '</span>';
  html += '<span class="card-rank-type">';
  html += '<span class="type-info">' + escapeHTML(typeInfo) + '</span>';
  html += '</span>';
  html += '</div>';

  // For location: Description and Tendencies appear above the 8-field grid
  if (CardState.cardType === 'location') {
    if (CardState.description) {
      html += '<div class="card-description">' + parseMarkdown(CardState.description) + '</div>';
    }
    if (CardState.tendencies) {
      html += '<div class="card-tendencies">' + escapeHTML(CardState.tendencies) + '</div>';
    }
    if (CardState.description || CardState.tendencies) {
      html += '<hr style="border:none;border-top:1px dashed var(--color-text-muted);margin:4px 0 10px">';
    }
  }

  // ---- Meta fields ----
  var metaHtml = '';

  switch (CardState.cardType) {
    case 'environment':
      // Description first
      if (CardState.description) {
        html += '<div class="card-description">' + parseMarkdown(CardState.description) + '</div>';
      }
      // Tendencies second
      if (CardState.tendencies) {
        html += '<div class="card-tendencies">' + escapeHTML(CardState.tendencies) + '</div>';
      }
      // Risks last
      if (CardState.description || CardState.tendencies) {
        html += '<hr style="border:none;border-top:1px dashed var(--color-text-muted);margin:4px 0 10px">';
      }
      metaHtml += metaItem('潜在风险', CardState.envRisks);
      break;

    case 'faction':
      // Description first
      if (CardState.description) {
        html += '<div class="card-description">' + parseMarkdown(CardState.description) + '</div>';
      }
      // Tendencies second
      if (CardState.tendencies) {
        html += '<div class="card-tendencies">' + escapeHTML(CardState.tendencies) + '</div>';
      }
      // Risks third
      if (CardState.description || CardState.tendencies) {
        html += '<hr style="border:none;border-top:1px dashed var(--color-text-muted);margin:4px 0 10px">';
      }
      metaHtml += metaItem('潜在风险', CardState.facRisks);
      // Allies fourth
      metaHtml += metaItem('潜在盟友', CardState.facAllies);
      // Other relations (above faction bar)
      if (CardState.facOtherRelations && CardState.facOtherRelations.length > 0) {
        // Sort: faction first, then character, then custom
        var sortedRels = CardState.facOtherRelations.slice();
        sortedRels.sort(function(a, b) {
          var order = { faction: 0, character: 1 };
          var aOrd = order[a.targetType] != null ? order[a.targetType] : 2;
          var bOrd = order[b.targetType] != null ? order[b.targetType] : 2;
          if (aOrd !== bOrd) return aOrd - bOrd;
          return 0;
        });
        var orelHtml = '';
        sortedRels.forEach(function(rel) {
          var chipClass = 'other-rel-chip ' + (rel.targetType === 'character' ? 'character' : 'faction');
          var typeDisplay = rel.targetType === 'faction' ? '势' : rel.targetType === 'character' ? '人' : rel.targetType.charAt(0);
          orelHtml += '<span class="' + chipClass + '">';
          orelHtml += '<span class="rel-type">' + typeDisplay + '</span>';
          orelHtml += escHtml(rel.targetName || '?');
          orelHtml += ' <span class="rel-value ' + getRelClass(rel.relation) + '">' + rel.relation + '</span>';
          orelHtml += '</span>';
        });
        metaHtml += '<div class="meta-item"><span class="meta-label">其他关系</span><span class="meta-value">' + orelHtml + '</span></div>';
      }
      // Faction relations bar — LAST (bottom of left column)
      metaHtml += '<div class="faction-bar-bottom">' + renderFactionBar() + '</div>';
      break;

    case 'stronghold':
      // Description first (same as other card types)
      if (CardState.description) {
        html += '<div class="card-description">' + parseMarkdown(CardState.description) + '</div>';
      }
      // Tendencies — right after description, like all other card types
      if (CardState.tendencies) {
        html += '<div class="card-tendencies">' + escapeHTML(CardState.tendencies) + '</div>';
      }
      if (CardState.description || CardState.tendencies) {
        html += '<hr style="border:none;border-top:1px dashed var(--color-text-muted);margin:4px 0 10px">';
      }
      // Allies list
      if (CardState.strAllies && CardState.strAllies.length > 0) {
        metaHtml += '<div class="meta-item">';
        metaHtml += '<span class="meta-label">盟友</span>';
        metaHtml += '<div class="meta-value">';
        CardState.strAllies.forEach(function(ally) {
          metaHtml += '<div class="ally-chip">';
          metaHtml += '<span class="ally-chip-name">' + escapeHTML(ally.name || '?') + '</span>';
          metaHtml += '</div>';
          if (ally.desc) {
            metaHtml += '<span class="ally-chip-desc">' + parseMarkdown(ally.desc) + '</span>';
          }
        });
        metaHtml += '</div></div>';
      }
      break;

    case 'location':
      var locFields = '';
      locFields += metaItem('主要地貌', CardState.locTerrain, true);
      locFields += metaItem('主题', CardState.locTheme, true);
      locFields += metaItem('存在势力', CardState.locFactions, true);
      locFields += metaItem('主要环境', CardState.locEnvs, true);
      locFields += metaItem('主要事件', CardState.locMainEvents, true);
      locFields += metaItem('危险与冲突', CardState.locDangers, true);
      locFields += metaItem('发现与盟友', CardState.locDiscoveries, true);
      locFields += metaItem('宿敌的计划', CardState.locNemesis, true);
      locFields += metaItem('谜团', CardState.locMysteries, true);
      locFields += metaItem('谜底', CardState.locTruth, true);
      metaHtml += '<div class="meta-grid">' + locFields + '</div>';
      break;
  }

  html += metaHtml;

  return html;
}

/** Render right column: traits only */
function renderCardRightContent() {
  var html = '';

  // Traits
  html += renderCardTraitsHTML();

  return html;
}

/** Render traits as HTML string for the card preview */
function renderCardTraitsHTML() {
  if (!CardState.traits || CardState.traits.length === 0) {
    return '';
  }

  var typeCSSClass = { '被动': 'type-passive', '反应': 'type-reaction', '主动': 'type-active' };
  var isStronghold = CardState.cardType === 'stronghold';

  var html = '<div class="card-traits">';
  for (var i = 0; i < CardState.traits.length; i++) {
    var t = CardState.traits[i];
    var name = t.name || '(未命名)';
    var typeLabel = t.type || '';
    var typeCls = typeCSSClass[typeLabel] || '';
    var desc = t.desc || '';
    var status = t.status || 'inactive';

    html += '<div class="card-trait-item">';
    html += '<div class="card-trait-header">';
    html += '<span class="trait-circle-wrap" onclick="toggleTraitStatus(' + i + ')">' + traitCircleSVG(status) + '</span>';
    // Source badge for stronghold
    if (isStronghold && t.source) {
      html += '<span class="card-trait-source">[' + escapeHTML(t.source) + ']</span>';
    }
    html += '<span class="card-trait-name">' + escapeHTML(name) + '</span>';
    if (typeLabel) {
      html += '<span class="card-trait-type' + (typeCls ? ' ' + typeCls : '') + '">' + escapeHTML(typeLabel) + '</span>';
    }
    if (t.type === '主动' && t.cost > 0) {
      var costLabel = isStronghold && t.costType ? t.costType : '历练点';
      html += '<span class="card-trait-cost">【耗费' + t.cost + costLabel + '】</span>';
    }
    html += '</div>';
    if (desc) {
      html += '<div class="card-trait-desc">' + escapeHTML(desc) + '</div>';
    }
    if (t.flavor) {
      html += '<span class="trait-flavor">' + parseMarkdown(t.flavor) + '</span>';
    }
    html += '</div>';
  }
  html += '</div>';

  return html;
}

function escapeHTML(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

/* ============================================================
   COLLAPSIBLE — Toggle accordion sections
   ============================================================ */
function toggleCollapse(el) {
  el.classList.toggle('open');
  var body = el.nextElementSibling;
  if (body) body.classList.toggle('open');
}

/* ============================================================
   HELPERS — State Update, Escaping, Custom Colors, Palette I/O
   ============================================================ */

function updateState(path, value) {
  CardState[path] = value;
  renderCardPreview();
}

function escHtml(s) {
  return escapeHTML(String(s));
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

function updateCustomColor(cssVar, value) {
  document.documentElement.style.setProperty(cssVar, value);

  var map = {
    '--color-primary': 'primary',
    '--color-accent': 'accent',
    '--color-bg-card': 'bgCard',
    '--color-text': 'text'
  };
  var key = map[cssVar];
  if (key) { CardState.customColors[key] = value; }
}

function exportPalette() {
  var exportData = {
    palette: CardState.palette,
    colors: CardState.palette === 'custom' ? CardState.customColors : null
  };
  var blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'palette-' + CardState.palette + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importPalette() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function (e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.palette) { alert('无效的色板文件：缺少 palette 字段'); return; }

        if (data.palette === 'custom' && data.colors) {
          CardState.customColors = data.colors;
          applyPalette('custom');
        } else {
          applyPalette(data.palette);
        }
        renderCardPreview();
      } catch (err) {
        alert('无法解析色板文件：' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

/* ============================================================
   PNG EXPORT — Fixed for html2canvas compatibility
   ============================================================ */
function exportPNG() {
  var card = document.getElementById('cardPreview');
  if (!card) return;

  // Temporarily simplify card styling for html2canvas
  var originalOutline = card.style.outline;
  var originalBorder = card.style.border;

  card.style.outline = 'none';
  card.style.border = '2px solid #000';

  var computedBg = window.getComputedStyle(card).backgroundColor;

  html2canvas(card, {
    scale: 2,
    backgroundColor: computedBg || '#F4F1EA',
    useCORS: true,
    allowTaint: true
  }).then(function(canvas) {
    card.style.outline = originalOutline;
    card.style.border = originalBorder;

    var link = document.createElement('a');
    link.download = (CardState.name || 'card') + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(function(err) {
    card.style.outline = originalOutline;
    card.style.border = originalBorder;
    alert('截图失败：' + err.message);
  });
}

/* ============================================================
   JSON EXPORT / IMPORT
   ============================================================ */
function exportJSON() {
  var blob = new Blob([JSON.stringify(CardState, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = (CardState.name || 'card') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function (e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data || typeof data !== 'object' || Array.isArray(data)) {
          alert('无效的卡片文件：JSON 根节点必须是对象');
          return;
        }
        var merged = deepClone(DefaultState);
        Object.keys(merged).forEach(function (k) {
          if (data[k] !== undefined) merged[k] = data[k];
        });
        // Backward compatibility: convert old string-format strAllies to array
        if (typeof merged.strAllies === 'string') {
          merged.strAllies = merged.strAllies ? [{ name: merged.strAllies, desc: '' }] : [];
        }
        if (data.image) { merged.image = Object.assign({}, DefaultState.image, data.image); }
        if (data.customColors) { merged.customColors = Object.assign({}, DefaultState.customColors, data.customColors); }
        if (data.traits) {
          merged.traits = data.traits;
          for (var i = 0; i < merged.traits.length; i++) {
            if (merged.traits[i].flavor === undefined) merged.traits[i].flavor = '';
            if (merged.traits[i].source === undefined) merged.traits[i].source = '';
            if (merged.traits[i].costType === undefined) merged.traits[i].costType = '历练点';
          }
        }
        Object.keys(merged).forEach(function (k) { CardState[k] = merged[k]; });
        applyPalette(CardState.palette);
        render();
      } catch (err) {
        alert('JSON 文件格式错误：' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function updateHeaderSubtitle() {
  var el = document.querySelector('.config-panel-header .subtitle');
