  var labels = { environment: '环境 / 探索 · 社交 · 险境 · 事件', faction: '势力 / 宗门 / 组织', location: '地点 / 遗迹 / 洞府', stronghold: '据点 / 基地 / 洞府' };
  el.textContent = labels[CardState.cardType] || '环境 / 势力 / 地点 / 据点';
}

function renderCardTypeTabs() {
  var tabs = document.querySelectorAll('#configTabs .tab-button');
  for (var i = 0; i < tabs.length; i++) {
    var tab = tabs[i];
    if (tab.getAttribute('data-type') === CardState.cardType) {
      tab.classList.add('active');
    } else {
      tab.classList.remove('active');
    }
  }
}

/* ============================================================
   PALETTE — Apply Color Palette
   ============================================================ */
function applyPalette(name) {
  CardState.palette = name;

  if (name === 'custom') {
    document.documentElement.style.setProperty('--color-primary', CardState.customColors.primary);
    document.documentElement.style.setProperty('--color-accent', CardState.customColors.accent);
    document.documentElement.style.setProperty('--color-bg-card', CardState.customColors.bgCard);
    document.documentElement.style.setProperty('--color-text', CardState.customColors.text);
    document.documentElement.removeAttribute('data-palette');
  } else {
    document.documentElement.style.removeProperty('--color-primary');
    document.documentElement.style.removeProperty('--color-accent');
    document.documentElement.style.removeProperty('--color-bg-card');
    document.documentElement.style.removeProperty('--color-text');
    document.documentElement.setAttribute('data-palette', name);
  }
}

/* ============================================================
   CARD TYPE — Switch Card Type
   ============================================================ */
function setCardType(type) {
  if (CardState.cardType === type) return;
  CardState.cardType = type;
  render();
}

/* ============================================================
   TRAITS — Config Editor
   ============================================================ */
function renderTraitsEditor() {
  var container = document.getElementById('traitsList');
  if (!container) return;

  var typeOptions = ['被动', '反应', '主动'];
  var isStronghold = CardState.cardType === 'stronghold';
  var html = '';

  for (var i = 0; i < CardState.traits.length; i++) {
    var t = CardState.traits[i];
    html += '<div class="trait-edit-box">';

    html += '<div class="trait-edit-row">';
    html += '<input type="text" class="form-input" value="' + escAttr(t.name || '') + '" oninput="updateTrait(' + i + ', \'name\', this.value)" placeholder="特性名称" style="flex:1;font-weight:bold">';
    html += '<select class="form-select" onchange="updateTrait(' + i + ', \'type\', this.value)" style="max-width:100px">';
    for (var j = 0; j < typeOptions.length; j++) {
      var sel = t.type === typeOptions[j] ? ' selected' : '';
      html += '<option value="' + typeOptions[j] + '"' + sel + '>' + typeOptions[j] + '</option>';
    }
    html += '</select>';
    if (t.type === '主动') {
      html += '<input type="number" class="form-input" value="' + (t.cost || 0) + '" oninput="updateTrait(' + i + ', \'cost\', parseInt(this.value)||0)" placeholder="耗费" style="max-width:70px" min="0">';
    }
    html += '</div>';

    // Stronghold extra fields: source + costType
    if (isStronghold) {
      html += '<div class="trait-edit-row" style="margin-top:4px;">';
      // Source with custom option
      var srcPresets = ['盟友','机关','其他'];
      var srcIsCustom = t.source && srcPresets.indexOf(t.source) === -1;
      html += '<select class="form-select" onchange="updateTraitSource(' + i + ', this.value)" style="flex:1; font-size:0.72rem;">';
      html += '<option value="">特征来源（可选）</option>';
      srcPresets.forEach(function(src) {
        html += '<option value="' + src + '" ' + (t.source===src && !srcIsCustom ? 'selected' : '') + '>' + src + '</option>';
      });
      if (srcIsCustom) {
        html += '<option value="' + escAttr(t.source) + '" selected>' + escHtml(t.source) + '</option>';
      }
      html += '<option value="__custom__">+ 自定义...</option>';
      html += '</select>';
      // Cost type with custom option
      var ctPresets = ['历练点','福缘点','储物格','灵气格','血量格','其他资源'];
      var ctVal = t.costType || '历练点';
      var ctIsCustom = ctPresets.indexOf(ctVal) === -1;
      html += '<select class="form-select" onchange="updateTraitCostType(' + i + ', this.value)" style="flex:1; font-size:0.72rem;">';
      ctPresets.forEach(function(ct) {
        html += '<option value="' + ct + '" ' + (ctVal===ct && !ctIsCustom ? 'selected' : '') + '>' + ct + '</option>';
      });
      if (ctIsCustom) {
        html += '<option value="' + escAttr(ctVal) + '" selected>' + escHtml(ctVal) + '</option>';
      }
      html += '<option value="__custom__">+ 自定义...</option>';
      html += '</select>';
      html += '</div>';
    }

    html += '<textarea class="form-textarea" oninput="updateTrait(' + i + ', \'desc\', this.value)" placeholder="特性描述" style="min-height:48px">' + escHtml(t.desc || '') + '</textarea>';

    html += '<input type="text" class="trait-flavor-input" value="' + escAttr(t.flavor || '') + '" placeholder="风味文字（支持*斜体* **加粗** ==高亮==）" oninput="updateTrait(' + i + ', \'flavor\', this.value)" style="width:100%; margin-top:4px; font-size:0.78rem; font-style:italic;">';

    html += '<div style="text-align:right;margin-top:4px"><button class="btn btn-remove btn-sm" onclick="removeTrait(' + i + ')">删除此特性</button></div>';

    html += '</div>';
  }

  container.innerHTML = html;
}

function updateTrait(index, field, value) {
  CardState.traits[index][field] = value;
  if (field === 'type') {
    renderTraitsEditor();
  }
  renderCardPreview();
}

function updateTraitSource(index, value) {
  if (value === '__custom__') {
    var custom = prompt('输入特征来源名称：');
    if (custom && custom.trim()) {
      CardState.traits[index].source = custom.trim();
    } else {
      CardState.traits[index].source = '其他';
    }
  } else {
    CardState.traits[index].source = value;
  }
  renderTraitsEditor();
  renderCardPreview();
}

function updateTraitCostType(index, value) {
  if (value === '__custom__') {
    var custom = prompt('输入消耗类型名称：');
    if (custom && custom.trim()) {
      CardState.traits[index].costType = custom.trim();
    } else {
      CardState.traits[index].costType = '历练点';
    }
  } else {
    CardState.traits[index].costType = value;
  }
  renderTraitsEditor();
  renderCardPreview();
}

function toggleTraitStatus(index) {
  var t = CardState.traits[index];
  if (t.status === 'inactive') t.status = 'active';
  else if (t.status === 'active') t.status = 'crossed';
  else t.status = 'inactive';
  renderCardPreview();
}

function addTrait() {
  CardState.traits.push({
    name: '', type: '被动', cost: 0, desc: '',
    status: 'inactive', flavor: '',
    source: '',
    costType: '历练点'
  });
  render();
}

function removeTrait(index) {
  CardState.traits.splice(index, 1);
  render();
}

/* ============================================================
   IMAGE — Render Config Panel Image Section (Ink Wash System)
   ============================================================ */
function renderImageSection() {
  var container = document.getElementById('imageSectionContent');
  if (!container) return;

  var hasImage = CardState.image.src && CardState.image.src !== '';
  var html = '';

  // Upload row (always visible)
  html += '<div class="image-upload-row" style="display:flex;gap:8px;align-items:center;margin-bottom:8px">';
  html += '<input type="file" accept="image/*" id="imageFileInput" onchange="handleImageUpload(event)" style="flex:1;min-width:0;font-size:0.78rem;color:var(--color-text)">';
  if (hasImage) {
    html += '<button class="btn btn-remove btn-sm" onclick="clearImage()" title="清除图片">清除</button>';
  }
  html += '</div>';

  // Collapsible: 水墨背景
  html += '<div class="collapse-toggle open" onclick="toggleCollapse(this)">水墨背景</div>';
  html += '<div class="collapse-body open">';

  // Ink style preset buttons — 11 presets
  var styles = [
    { id: 'none', name: '无背景' },
    { id: '水墨', name: '水墨' },
    { id: '青绿', name: '青绿' },
    { id: '朱砂', name: '朱砂' },
    { id: '古卷', name: '古卷' },
    { id: '淡墨', name: '淡墨' },
    { id: '霜华', name: '霜华' },
    { id: '暮色', name: '暮色' },
    { id: '烟雨', name: '烟雨' },
    { id: '丹青', name: '丹青' },
    { id: '残卷', name: '残卷' }
  ];

  html += '<div class="ink-style-buttons">';
  for (var i = 0; i < styles.length; i++) {
    var s = styles[i];
    var isActive = CardState.image.inkStyle === s.id;
    html += '<button class="ink-style-btn' + (isActive ? ' active' : '') + '" onclick="setInkStyle(\'' + s.id + '\')">' + s.name + '</button>';
  }
  html += '</div>';

  // Opacity slider + position button (only when image and style selected)
  if (hasImage && CardState.image.inkStyle !== 'none') {
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;margin-top:8px">';
    html += '<span style="font-size:0.75rem;color:var(--color-text-muted);white-space:nowrap">透明度</span>';
    html += '<input type="range" min="5" max="40" value="' + Math.round(CardState.image.opacity * 100) + '" oninput="updateInkOpacity(this.value)" style="flex:1;accent-color:var(--color-accent)">';
    html += '<span style="font-size:0.72rem;color:var(--color-text-muted);min-width:30px;text-align:right">' + Math.round(CardState.image.opacity * 100) + '%</span>';
    html += '</div>';
    html += '<button class="btn btn-outline btn-sm" onclick="openImageEditor()" style="width:100%">调整图片位置</button>';
  }

  html += '</div>'; // close collapse-body

  container.innerHTML = html;
}

function setInkStyle(styleId) {
  CardState.image.inkStyle = styleId;
  renderCardPreview();
}

function updateInkOpacity(val) {
  CardState.image.opacity = parseInt(val) / 100;
  renderCardPreview();
}

/* ============================================================
   IMAGE — Handle File Upload
   ============================================================ */
function handleImageUpload(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    CardState.image.src = ev.target.result;
    CardState.image.inkStyle = CardState.image.inkStyle === 'none' ? '水墨' : CardState.image.inkStyle;
    CardState.image.posX = 50;
    CardState.image.posY = 50;
    CardState.image.scale = 100;
    render();
    openImageEditor();
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  CardState.image.src = '';
  CardState.image.inkStyle = 'none';
  CardState.image.opacity = 0.18;
  CardState.image.posX = 50;
  CardState.image.posY = 50;
  CardState.image.scale = 100;
  render();
}

/* ============================================================
   IMAGE — Simplified Ink Wash Editor Modal
   ============================================================ */
function openImageEditor() {
  var existing = document.getElementById('imageEditorModal');
  if (existing) existing.remove();

  var hasImage = CardState.image.src && CardState.image.src !== '';
  if (!hasImage) return;

  var defOpacity = Math.round(CardState.image.opacity * 100);
  var defX = CardState.image.posX;
  var defY = CardState.image.posY;
  var defScale = CardState.image.scale || 100;

  var html = '<div class="editor-modal-overlay" id="imageEditorModal">';
  html += '<div class="editor-modal-content">';

  // Left: preview pane showing ink wash effect
  html += '<div class="editor-preview-pane">';
  html += '<div class="editor-frame">';
  html += '<div class="editor-ink-preview" id="editorInkPreview" style="background-image:url(\'' + escAttr(CardState.image.src) + '\');opacity:' + CardState.image.opacity + ';background-position:' + defX + '% ' + defY + '%;background-size:' + defScale + '%;"></div>';
  html += '</div>';
  html += '</div>';

  // Right: controls
  html += '<div class="editor-controls-pane">';
  html += '<p style="font-size:0.78rem;color:var(--color-text-muted);margin-bottom:4px">调整背景图片位置与透明度</p>';

  html += '<label>透明度 <span id="edOpacityVal">' + defOpacity + '%</span></label>';
  html += '<input type="range" id="edOpacitySlider" min="5" max="40" value="' + defOpacity + '" oninput="updateEditorInkPreview()">';

  html += '<label>水平位置 <span id="edXVal">' + defX + '%</span></label>';
  html += '<input type="range" id="edXSlider" min="0" max="100" value="' + defX + '" oninput="updateEditorInkPreview()">';

  html += '<label>垂直位置 <span id="edYVal">' + defY + '%</span></label>';
  html += '<input type="range" id="edYSlider" min="0" max="100" value="' + defY + '" oninput="updateEditorInkPreview()">';

  html += '<label>缩放 <span id="edScaleVal">' + defScale + '%</span></label>';
  html += '<input type="range" id="edScaleSlider" min="50" max="200" value="' + defScale + '" oninput="updateEditorInkPreview()">';

  html += '<div class="editor-buttons">';
  html += '<button class="btn btn-primary" onclick="applyImageEdit()">确认</button>';
  html += '<button class="btn btn-outline" onclick="closeImageEditor()">取消</button>';
  html += '</div>';
  html += '</div>';

  html += '</div></div>';

  var div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div.firstElementChild);
}

function updateEditorInkPreview() {
  var opacitySlider = document.getElementById('edOpacitySlider');
  var xSlider = document.getElementById('edXSlider');
  var ySlider = document.getElementById('edYSlider');
  var scaleSlider = document.getElementById('edScaleSlider');
  if (!opacitySlider || !xSlider || !ySlider) return;

  var opacity = parseInt(opacitySlider.value);
  var x = parseInt(xSlider.value);
  var y = parseInt(ySlider.value);
  var scale = scaleSlider ? parseInt(scaleSlider.value) : 100;

  var opVal = document.getElementById('edOpacityVal');
  if (opVal) opVal.textContent = opacity + '%';
  var xVal = document.getElementById('edXVal');
  if (xVal) xVal.textContent = x + '%';
  var yVal = document.getElementById('edYVal');
  if (yVal) yVal.textContent = y + '%';
  var sVal = document.getElementById('edScaleVal');
  if (sVal) sVal.textContent = scale + '%';

  var preview = document.getElementById('editorInkPreview');
  if (preview) {
    preview.style.opacity = opacity / 100;
    preview.style.backgroundPosition = x + '% ' + y + '%';
    preview.style.backgroundSize = scale + '%';
  }
}

function applyImageEdit() {
  var opacitySlider = document.getElementById('edOpacitySlider');
  var xSlider = document.getElementById('edXSlider');
  var ySlider = document.getElementById('edYSlider');
  var scaleSlider = document.getElementById('edScaleSlider');

  if (opacitySlider && xSlider && ySlider) {
    CardState.image.opacity = parseInt(opacitySlider.value) / 100;
    CardState.image.posX = parseInt(xSlider.value);
    CardState.image.posY = parseInt(ySlider.value);
    CardState.image.scale = scaleSlider ? parseInt(scaleSlider.value) : 100;
  }

  closeImageEditor();
  renderCardPreview();
}

function closeImageEditor() {
  var modal = document.getElementById('imageEditorModal');
  if (modal) modal.remove();
  renderCardPreview();
}

/* ============================================================
   GM FLOATING SIDEBAR PANEL — Functions
   ============================================================ */

function getActiveCard(type) {
  return openDB().then(function() {
    return new Promise(function(resolve, reject) {
      var tx = _db.transaction('active', 'readonly');
      var store = tx.objectStore('active');
      var request = store.get(type);
      request.onsuccess = function() {
        var result = request.result;
        resolve(result ? result.data : null);
      };
      request.onerror = function() { reject(request.error); };
    });
  }).catch(function(e) { return null; });
}

function setActiveCard(type) {
  var typeMap = { env: 'environment', fac: 'faction', loc: 'location', str: 'stronghold' };
  if (CardState.cardType !== typeMap[type]) {
    alert('请先切换到对应的卡片类型');
    return;
  }
  try {
    return openDB().then(function() {
      return new Promise(function(resolve, reject) {
        var tx = _db.transaction('active', 'readwrite');
        var store = tx.objectStore('active');
        store.put({
          type: type,
          data: JSON.parse(JSON.stringify(CardState))
        });
        tx.oncomplete = function() { renderGMPanel(); resolve(); };
        tx.onerror = function() { reject(tx.error); };
      });
    }).catch(function(e) {
      console.error('setActiveCard error:', e);
      alert('保存失败：' + e.message);
    });
  } catch(e) {
    alert('保存失败：' + e.message);
  }
}

function loadActiveCard(type) {
  getActiveCard(type).then(function(card) {
    if (!card) return;
    Object.keys(card).forEach(function(k) { CardState[k] = card[k]; });
    applyPalette(CardState.palette);
    render();
  });
}

function clearActiveCard(type) {
  openDB().then(function() {
    return new Promise(function(resolve, reject) {
      var tx = _db.transaction('active', 'readwrite');
      var store = tx.objectStore('active');
      store.delete(type);
      tx.oncomplete = function() { renderGMPanel(); resolve(); };
      tx.onerror = function() { reject(tx.error); };
    });
  }).catch(function(e) { console.error('clearActiveCard error:', e); });
}

function toggleGMPanel() {
  var panel = document.getElementById('gmPanel');
  var toggle = document.getElementById('gmPanelToggle');
  var isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    toggle.classList.remove('open');
    toggle.textContent = '常用速切';
  } else {
    panel.classList.add('open');
    toggle.classList.add('open');
    toggle.textContent = '收起';
    renderGMPanel();
  }
}

function renderGMPanel() {
  var panel = document.getElementById('gmPanelContent');
  if (!panel) return;

  var types = [
    { key: 'env', label: '环境' },
    { key: 'fac', label: '势力' },
    { key: 'loc', label: '地点' },
    { key: 'str', label: '据点' }
  ];

  var promises = types.map(function(t) {
    return getActiveCard(t.key).then(function(card) {
      return renderGMImportOptions(t.key).then(function(importOpts) {
        var html = '<div class="gm-card-slot">';
        html += '<div class="gm-slot-label">' + t.label + '</div>';
        if (card) {
          html += '<div class="gm-mini-card" onclick="loadActiveCard(\'' + t.key + '\')" title="点击载入编辑器">';
          html += '<span class="gm-mini-name">' + escHtml(card.name || '未命名') + '</span>';
          html += '<span class="gm-mini-meta">' + getTypeLabel(card) + '</span>';
          html += '</div>';
          html += '<button class="gm-slot-btn" onclick="event.stopPropagation(); clearActiveCard(\'' + t.key + '\')">清除</button>';
        } else {
          html += '<div class="gm-mini-card empty">空</div>';
        }
        html += '<button class="gm-slot-btn set" onclick="setActiveCard(\'' + t.key + '\')">设为当前' + t.label + '</button>';
        html += '<select class="gm-slot-select" onchange="importFromSlotToActive(\'' + t.key + '\', this.value); this.value=\'\';" style="width:100%; font-size:0.62rem; margin-top:4px; padding:2px;">';
        html += '<option value="">— 从槽位导入 —</option>';
        html += importOpts;
        html += '</select>';
        html += '</div>';
        return html;
      });
    });
  });

  Promise.all(promises).then(function(results) {
    panel.innerHTML = results.join('');
  });
}

function renderGMImportOptions(type) {
  var typeMap = { env: 'environment', fac: 'faction', loc: 'location', str: 'stronghold' };
  var targetType = typeMap[type];
  var promiseList = [];
  for (var i = 1; i <= 10; i++) {
    (function(slotNum) {
      promiseList.push(getSlotInfo(slotNum).then(function(info) {
        if (info && info.data && info.data.cardType === targetType) {
          return '<option value="' + slotNum + '">槽位' + slotNum + ': ' + escHtml(info.name || '?') + '</option>';
        }
        return '';
      }));
    })(i);
  }
  return Promise.all(promiseList).then(function(opts) {
    return opts.filter(function(o) { return o !== ''; }).join('');
  });
}

function importFromSlotToActive(type, slotNum) {
  if (!slotNum) return;
  getSlotInfo(parseInt(slotNum)).then(function(info) {
    if (!info || !info.data) return;
    openDB().then(function() {
      return new Promise(function(resolve, reject) {
        var tx = _db.transaction('active', 'readwrite');
        var store = tx.objectStore('active');
        store.put({ type: type, data: info.data });
        tx.oncomplete = function() { renderGMPanel(); resolve(); };
        tx.onerror = function() { reject(tx.error); };
      });
    });
  }).catch(function(e) { console.error(e); });
}

function getTypeLabel(card) {
  if (card.cardType === 'environment') return (card.envType || '') + ' · 难度' + (card.envDifficulty || '?');
  if (card.cardType === 'faction') return '难度' + (card.facDifficulty || '?');
  if (card.cardType === 'location') return '地点';
  if (card.cardType === 'stronghold') return '据点 · 难度' + (card.strDifficulty || '?');
  return '';
}

  render();

  var tabs = document.querySelectorAll('#configTabs .tab-button');
  for (var i = 0; i < tabs.length; i++) {

  var btnAddTrait = document.getElementById('btnAddTrait');
  if (btnAddTrait) {

  }); // end openDB().then()

});
