<main class="demo-page">

  <section class="demo-grid three">
    <article class="demo-card"><h3>普通输入</h3><pb-module id="free-basic"></pb-module></article>
    <article class="demo-card"><h3>隐藏视觉标签</h3><pb-module id="free-hidden-label"></pb-module></article>

  <section class="demo-card wide" data-guide-region-id="validation-equation">
    <h3>Validation 练习：C = A + B</h3>

    <div class="demo-equation"><pb-module id="validation-a"></pb-module><pb-module id="validation-b"></pb-module><pb-module id="validation-c"></pb-module></div>
