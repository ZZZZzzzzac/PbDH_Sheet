<main class="demo-page">
  <header class="demo-page-header"><h2>Countable Resource</h2><p>数值与标记共享同一 Character Data；右键或长按可改上限标记的按钮。</p></header>
  <section class="demo-grid single">
    <article class="demo-card"><h3>有限数值</h3><pb-module id="count-numeric-bounded"></pb-module></article>
    <article class="demo-card"><h3>可改上限数值</h3><p class="demo-note">数值展示可把上限暴露为输入框；修改上限时，当前值会自动保持在新范围内。</p><pb-module id="count-numeric-editable"></pb-module></article>
    <article class="demo-card"><h3>无上限数值</h3><p class="demo-note">本例步长为 2；Author 可通过 <strong>步长</strong> 配置每次加减的数值。</p><pb-module id="count-numeric-unbounded"></pb-module></article>
    <article class="demo-card"><h3>固定上限标记</h3><pb-module id="count-marker-fixed"></pb-module></article>
    <article class="demo-card"><h3>可改上限标记</h3><pb-module id="count-marker-editable"></pb-module></article>
    <article class="demo-card"><h3>无上限标记</h3><pb-module id="count-marker-unbounded"></pb-module></article>
  </section>
</main>
