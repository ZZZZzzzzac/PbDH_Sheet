name: Deploy Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "已发布版本，不带 v，例如 1.3.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pbdh-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ vars.PUBLIC_URL }}
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      PUBLIC_URL: ${{ vars.PUBLIC_URL }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate deployment input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          node scripts/release-tools.mjs check-version "$VERSION"
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$PUBLIC_URL"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"

      - name: Download and verify Release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"
          test "$(gh release view "$TAG" --json isDraft --jq .isDraft)" = "false"
          test "$(gh release view "$TAG" --json isPrerelease --jq .isPrerelease)" = "false"
          gh release download "$TAG" \
            --pattern "pbdh-sheet-$VERSION.tar.gz" \
            --pattern "pbdh-sheet-$VERSION.tar.gz.sha256"
          sha256sum -c "pbdh-sheet-$VERSION.tar.gz.sha256"

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Stage and activate Release
        env:
          VERSION: ${{ inputs.version }}
          RUN_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          ARCHIVE="pbdh-sheet-$VERSION.tar.gz"
          ARTIFACT_SHA256="$(sha256sum "$ARCHIVE" | cut -d ' ' -f 1)"
          TARGET="$DEPLOY_USER@$DEPLOY_HOST"
          STAGING_PATH="$DEPLOY_PATH/.staging/$VERSION-$RUN_KEY"
          STATE="$(ssh "$TARGET" bash -s -- prepare "$VERSION" "$ARTIFACT_SHA256" "$DEPLOY_PATH" "$RUN_KEY" < scripts/deploy-release.sh)"
          if [[ "$STATE" == "upload" ]]; then
            gzip -dc "$ARCHIVE" | ssh "$TARGET" "tar -x -C '$STAGING_PATH'"
          elif [[ "$STATE" != "reuse" ]]; then
            echo "Unexpected remote state: $STATE" >&2
            exit 1
          fi
          ssh "$TARGET" bash -s -- activate "$VERSION" "$ARTIFACT_SHA256" "$DEPLOY_PATH" "$RUN_KEY" < scripts/deploy-release.sh

      - name: Verify public version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          HTML="$(curl --fail --silent --show-error --retry 5 --retry-delay 2 "$PUBLIC_URL?deploy=${GITHUB_RUN_ID}")"
          grep -Fq "<meta name=\"pbdh-version\" content=\"$VERSION\">" <<< "$HTML"
